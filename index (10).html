          <h2 style={{fontSize:"1.15rem",fontWeight:700,margin:0}}>🧠 הכנה למבחן עם AI</h2>
        </div>
        {allTests.length===0?(
          <div style={{textAlign:"center",padding:"3rem",color:C.muted}}>אין מבחנים קרובים</div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:"0.65rem"}}>
            {allTests.map(test=>{
              const d=test.dueDate?Math.ceil((new Date(test.dueDate)-new Date())/(1000*60*60*24)):null;
              return (
                <div key={test.id+(test._clsName||"")} onClick={()=>setExamTest(test)} style={{background:C.card,border:"1px solid #f6855a44",borderRadius:"14px",padding:"1rem 1.25rem",cursor:"pointer",display:"flex",alignItems:"center",gap:"0.75rem"}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:"0.95rem"}}>{test.title}</div>
                    {test._clsName&&<div style={{fontSize:"0.75rem",color:C.muted}}>🏫 {test._clsName}</div>}
                    {test.topics&&<div style={{fontSize:"0.78rem",color:"#f6855a",marginTop:"0.2rem"}}>📋 {test.topics}</div>}
                  </div>
                  {d!==null&&<span style={{fontSize:"0.78rem",color:d<=3?"#f6855a":"#f6ad55",background:C.card,border:`1px solid ${d<=3?"#f6855a44":C.border}`,padding:"0.2rem 0.5rem",borderRadius:"20px",whiteSpace:"nowrap"}}>עוד {d} ימים</span>}
                  <span style={{fontSize:"0.82rem",color:"#f6855a",fontWeight:700}}>הכן אותי ←</span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  // Home screen
  const totalSets=(isAdminSomewhere?personalSets.length:0)+classSets.length;
  const cntTests=[...(user.personal?.tests||[]),...(myClasses||[]).flatMap(c=>c.tests||[])].filter(t=>{const today=new Date().toISOString().split("T")[0];return !t.done&&(!t.dueDate||t.dueDate>=today);}).length;
  const TYPES=[
    {id:"dictation",icon:"📝",title:"למידה להכתבה",desc:"ערכות מילים עם תרגום — למד, חזור ובחן",color:"#6c63ff",tag:"מילים ותרגום",available:true,cnt:totalSets>0?totalSets:null},
    {id:"exam",icon:"🧠",title:"הכנה למבחן",desc:"בחר מבחן קרוב — AI יסביר ויענה שאלות",color:"#f6855a",tag:"AI חכם",available:true,cnt:cntTests>0?cntTests:null},
    {id:"coming1",icon:"🔜",title:"בקרוב...",desc:"עוד סוגי למידה יתווספו בקרוב!",color:C.muted,tag:"בפיתוח",available:false,cnt:null},
  ];
  return (
    <div>
      <div style={{marginBottom:"1.75rem"}}>
        <h2 style={{fontSize:"1.2rem",fontWeight:700,margin:"0 0 0.3rem"}}>📖 מצב למידה</h2>
        <p style={{color:C.muted,fontSize:"0.84rem",margin:0}}>בחר את סוג הלמידה שאתה רוצה</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:"1rem"}}>
        {TYPES.map(type=>(
          <div key={type.id} onClick={()=>type.available&&setSection(type.id)}
            style={{background:C.card,border:`2px solid ${type.available?type.color+"55":C.border}`,borderRadius:"16px",padding:"1.5rem 1.25rem",cursor:type.available?"pointer":"default",opacity:type.available?1:0.55,position:"relative",overflow:"hidden",transition:"border 0.15s"}}
            onMouseEnter={e=>{if(type.available)e.currentTarget.style.border=`2px solid ${type.color}`;}}
            onMouseLeave={e=>{if(type.available)e.currentTarget.style.border=`2px solid ${type.color+"55"}`;}}
          >
            {type.available&&<div style={{position:"absolute",top:0,left:0,right:0,height:"3px",background:`linear-gradient(90deg,${type.color},${type.color}88)`}}></div>}
            {type.cnt&&<div style={{position:"absolute",top:"0.75rem",left:"0.75rem",background:type.color,color:"#fff",fontSize:"0.68rem",fontWeight:700,padding:"0.15rem 0.45rem",borderRadius:"20px"}}>{type.cnt}</div>}
            <div style={{fontSize:"2.2rem",marginBottom:"0.7rem"}}>{type.icon}</div>
            <div style={{fontWeight:700,fontSize:"1.05rem",color:type.available?type.color:C.muted,marginBottom:"0.4rem"}}>{type.title}</div>
            <div style={{fontSize:"0.8rem",color:C.muted,lineHeight:1.45,marginBottom:"0.9rem"}}>{type.desc}</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontSize:"0.7rem",background:type.color+"22",color:type.available?type.color:C.muted,padding:"0.18rem 0.55rem",borderRadius:"20px",fontWeight:600}}>{type.tag}</span>
              {type.available&&<span style={{fontSize:"0.82rem",color:type.color,fontWeight:700}}>כנס ←</span>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AIQuizMode({ test, topics, onBack, user }) {
  const AI="#f6855a";
  const [difficulty,setDifficulty]=React.useState("medium");
  const [qType,setQType]=React.useState("multiple");
  const [questions,setQuestions]=React.useState([]);
  const [idx,setIdx]=React.useState(0);
  const [answer,setAnswer]=React.useState("");
  const [hint,setHint]=React.useState("");
  const [showHint,setShowHint]=React.useState(false);
  const [submitted,setSubmitted]=React.useState(false);
  const [correct,setCorrect]=React.useState(null);
  const [score,setScore]=React.useState(0);
  const [loading,setLoading]=React.useState(false);
  const [generating,setGenerating]=React.useState(false);
  const [aiError,setAiError]=React.useState("");
  const [history,setHistory]=React.useState([]);

  const DIFF={easy:"קלה",medium:"בינונית",hard:"קשה"};
  const diffColor={easy:C.green,medium:"#f6ad55",hard:"#fc8181"};

  const generateQuestions=async()=>{
    setGenerating(true);setQuestions([]);setIdx(0);setScore(0);setHistory([]);
    const prompt="צור 8 שאלות מבחן בעברית על המבחן הבא.\nחוקים חשובים:\n- השאלות חייבות להיות ספציפיות לנושא המבחן בלבד.\n- בשאלות אמריקאיות: התשובות השגויות חייבות להיות הגיוניות ומבלבלות — לא מספרים סתמיים קרובים. כל אפשרות שגויה צריכה להיות טעות נפוצה, מושג קרוב, או תשובה שנשמעת נכונה אבל לא.\n- אל תשתמש באפשרויות כמו שבע/שש/שמונה/חמש אם הן לא קשורות לנושא."+(user?.grade?"\nרמת תלמיד: כיתה "+user.grade+" — התאם רמת קושי וניסוח לגיל זה.":"")+"\nשם המבחן: "+test.title+(test.subject?"\nמקצוע: "+test.subject:"")+(topics?"\nנושאים: "+topics:"")+(test._clsName?"\nכיתה: "+test._clsName:"")+"\nרמת קושי: "+DIFF[difficulty]+"\nסוג: "+(qType==="multiple"?"אמריקאי - כל שאלה עם 4 אפשרויות":"פתוח - תשובה חופשית")+"\n\nהחזר JSON בלבד במבנה הבא:\n[{\"q\":\"שאלה\",\"opts\":[\"א\",\"ב\",\"ג\",\"ד\"],\"ans\":\"א\",\"hint\":\"רמז קצר\",\"explain\":\"הסבר קצר\"}]\n\nאם פתוח: opts=[] ו-ans=התשובה הנכונה. רק JSON, בלי שום טקסט נוסף.";
    try{
      const txt=await callAI({messages:[{role:"user",content:prompt}],max_tokens:2000});
      const clean=txt.replace(/```json|```/g,"").trim();
      const qs=JSON.parse(clean);
      setQuestions(qs);
    }catch(e){setQuestions([]);setAiError("שגיאה: "+e.message);}
    setGenerating(false);
  };

  const getHint=async()=>{
    if(showHint)return;
    setLoading(true);
    const q=questions[idx];
    const hintTxt=await callAI({messages:[{role:"user",content:"תן רמז קצר (משפט אחד) לשאלה: "+q.q+(user?.grade?" (תלמיד כיתה "+user.grade+", התאם רמה)":"")}],max_tokens:100});
    setHint(q.hint||(hintTxt||""));
    setShowHint(true);setLoading(false);
  };

  const submit=()=>{
    if(!answer.trim())return;
    const q=questions[idx];
    const isC=qType==="multiple"?answer===q.ans:answer.trim().length>2;
    setCorrect(isC);setSubmitted(true);
    if(isC)setScore(s=>s+1);
    setHistory(h=>[...h,{idx,answer,correct:isC}]);
  };

  const goTo=(newIdx)=>{
    if(newIdx<0||newIdx>=questions.length)return;
    const prev=history.find(h=>h.idx===newIdx);
    setIdx(newIdx);
    setAnswer(prev?prev.answer:"");
    setSubmitted(!!prev);
    setCorrect(prev?prev.correct:null);
    setShowHint(false);setHint("");
  };

  // Settings screen
  if(questions.length===0&&!generating) return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:"0.75rem",marginBottom:"1.5rem"}}>
        <button onClick={onBack} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.35rem 0.7rem",borderRadius:"8px",fontSize:"0.85rem",cursor:"pointer"}}>← חזרה</button>
        <h2 style={{fontSize:"1.1rem",fontWeight:700,margin:0}}>✏️ מבחן AI</h2>
      </div>
      <div style={{background:C.card,border:`2px solid ${AI}44`,borderRadius:"20px",padding:"1.75rem",display:"flex",flexDirection:"column",gap:"1.1rem"}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:"2.5rem",marginBottom:"0.4rem"}}>✏️</div>
          <div style={{fontWeight:700,fontSize:"1.1rem",color:AI}}>{test.title}</div>
          {topics&&<div style={{fontSize:"0.78rem",color:C.muted,marginTop:"0.2rem"}}>📋 {topics}</div>}
        </div>
        <div>
          <div style={{fontSize:"0.8rem",color:C.muted,fontWeight:600,marginBottom:"0.5rem"}}>רמת קושי:</div>
          <div style={{display:"flex",gap:"0.5rem"}}>
            {Object.entries(DIFF).map(([k,v])=>(
              <button key={k} onClick={()=>setDifficulty(k)} style={{flex:1,background:difficulty===k?diffColor[k]+"33":"transparent",border:`1px solid ${difficulty===k?diffColor[k]:C.border}`,color:difficulty===k?diffColor[k]:C.muted,padding:"0.5rem",borderRadius:"10px",fontSize:"0.85rem",fontWeight:difficulty===k?700:400,cursor:"pointer"}}>{v}</button>
            ))}
          </div>
        </div>
        <div>
          <div style={{fontSize:"0.8rem",color:C.muted,fontWeight:600,marginBottom:"0.5rem"}}>סוג שאלות:</div>
          <div style={{display:"flex",gap:"0.5rem"}}>
            <button onClick={()=>setQType("multiple")} style={{flex:1,background:qType==="multiple"?AI+"33":"transparent",border:`1px solid ${qType==="multiple"?AI:C.border}`,color:qType==="multiple"?AI:C.muted,padding:"0.5rem",borderRadius:"10px",fontSize:"0.85rem",fontWeight:qType==="multiple"?700:400,cursor:"pointer"}}>🔘 אמריקאי</button>
            <button onClick={()=>setQType("open")} style={{flex:1,background:qType==="open"?AI+"33":"transparent",border:`1px solid ${qType==="open"?AI:C.border}`,color:qType==="open"?AI:C.muted,padding:"0.5rem",borderRadius:"10px",fontSize:"0.85rem",fontWeight:qType==="open"?700:400,cursor:"pointer"}}>✍️ פתוח</button>
          </div>
        </div>
        <button onClick={()=>{setAiError("");generateQuestions();}} style={{background:C.accent,color:"#fff",border:`1px solid ${AI}`,padding:"0.75rem",borderRadius:"12px",fontSize:"0.95rem",fontWeight:700,cursor:"pointer"}}>🚀 צור מבחן</button>
      </div>
    </div>
  );

  if(aiError) return (
    <div style={{textAlign:"center",padding:"3rem 2rem"}}>
      <div style={{fontSize:"2.5rem",marginBottom:"1rem"}}>❌</div>
      <div style={{color:"#fc8181",fontWeight:600,marginBottom:"1rem"}}>{aiError}</div>
      <button onClick={()=>setAiError("")} style={{background:C.accent,color:"#fff",border:"none",padding:"0.6rem 1.5rem",borderRadius:"10px",cursor:"pointer"}}>נסה שוב</button>
    </div>
  );

  if(generating) return (
    <div style={{textAlign:"center",padding:"4rem 2rem"}}>
      <div style={{fontSize:"3rem",marginBottom:"1rem"}}>⏳</div>
      <div style={{color:AI,fontWeight:700,fontSize:"1.1rem"}}>מייצר שאלות...</div>
      <div style={{color:C.muted,fontSize:"0.85rem",marginTop:"0.5rem"}}>זה יקח כמה שניות</div>
    </div>
  );

  const q=questions[idx];
  const done=idx>=questions.length;
  if(done) return (
    <div style={{textAlign:"center",padding:"3rem"}}>
      <div style={{fontSize:"3rem",marginBottom:"1rem"}}>{score/questions.length>=0.8?"🎉":"📚"}</div>
      <div style={{fontSize:"1.3rem",fontWeight:700,marginBottom:"0.5rem"}}>{score}/{questions.length} נכון</div>
      <div style={{color:C.muted,marginBottom:"1.5rem"}}>{score/questions.length>=0.8?"מצוין!":score/questions.length>=0.5?"טוב, המשך":"כדאי לחזור שוב"}</div>
      <div style={{display:"flex",gap:"0.75rem",justifyContent:"center"}}>
        <button onClick={()=>{setQuestions([]);setScore(0);setHistory([]);}} style={{background:AI,color:"#fff",border:"none",padding:"0.6rem 1.25rem",borderRadius:"10px",fontSize:"0.9rem",fontWeight:600,cursor:"pointer"}}>🔄 מבחן חדש</button>
        <button onClick={onBack} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.text,padding:"0.6rem 1.25rem",borderRadius:"10px",fontSize:"0.9rem",cursor:"pointer"}}>← חזרה</button>
      </div>
    </div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",gap:"0.75rem"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"0.5rem",flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
          <span style={{fontWeight:700,fontSize:"0.95rem",color:AI}}>שאלה {idx+1} מתוך {questions.length}</span>
          <span style={{fontSize:"0.7rem",background:diffColor[difficulty]+"22",color:diffColor[difficulty],border:`1px solid ${diffColor[difficulty]}44`,padding:"0.1rem 0.4rem",borderRadius:"20px"}}>{DIFF[difficulty]}</span>
        </div>
        <div style={{display:"flex",gap:"0.4rem",alignItems:"center"}}>
          <select value={difficulty} onChange={e=>{setDifficulty(e.target.value);setQuestions([]);}} style={{background:C.card,border:`1px solid ${C.border}`,color:C.text,padding:"0.25rem 0.4rem",borderRadius:"6px",fontSize:"0.75rem",outline:"none"}}>
            {Object.entries(DIFF).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select>
          <select value={qType} onChange={e=>{setQType(e.target.value);setQuestions([]);}} style={{background:C.card,border:`1px solid ${C.border}`,color:C.text,padding:"0.25rem 0.4rem",borderRadius:"6px",fontSize:"0.75rem",outline:"none"}}>
            <option value="multiple">אמריקאי</option>
            <option value="open">פתוח</option>
          </select>
        </div>
      </div>

      {/* Progress bar */}
      <div style={{height:"4px",background:C.border,borderRadius:"4px",overflow:"hidden"}}>
        <div style={{height:"100%",width:((idx)/questions.length*100)+"%",background:AI,borderRadius:"4px",transition:"width 0.3s"}}/>
      </div>

      {/* Question */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"16px",padding:"1.25rem",minHeight:"80px"}}>
        <div style={{fontSize:"1rem",fontWeight:600,lineHeight:1.6}}>{q.q}</div>
      </div>

      {/* Answer options */}
      {qType==="multiple"?(
        <div style={{display:"flex",flexDirection:"column",gap:"0.5rem"}}>
          {(q.opts||[]).map((opt,i)=>{
            const isSelected=answer===opt;
            const isCorrect=submitted&&opt===q.ans;
            const isWrong=submitted&&isSelected&&!isCorrect;
            return (
              <button key={i} onClick={()=>{if(!submitted)setAnswer(opt);}} style={{background:isCorrect?"#48bb7822":isWrong?"#fc818122":isSelected?AI+"22":C.card,border:`1px solid ${isCorrect?C.green:isWrong?"#fc8181":isSelected?AI:C.border}`,color:C.text,padding:"0.75rem 1rem",borderRadius:"12px",fontSize:"0.9rem",textAlign:"right",cursor:submitted?"default":"pointer",fontWeight:isCorrect||isSelected?600:400}}>
                {isCorrect?"✓ ":isWrong?"✗ ":""}{opt}
              </button>
            );
          })}
        </div>
      ):(
        <textarea value={answer} onChange={e=>{if(!submitted)setAnswer(e.target.value);}} disabled={submitted} placeholder="כתוב את תשובתך כאן..." style={{background:C.card,border:`2px solid ${submitted?(correct?C.green:"#fc8181"):C.border}`,color:C.text,padding:"0.85rem",borderRadius:"12px",fontSize:"0.9rem",outline:"none",width:"100%",minHeight:"100px",resize:"vertical",direction:"rtl"}} />
      )}

      {/* Feedback */}
      {submitted&&(
        <div style={{background:correct?C.green+"22":"#fc818122",border:`1px solid ${correct?C.green:"#fc8181"}`,borderRadius:"12px",padding:"0.75rem 1rem",color:correct?C.green:"#fc8181",fontWeight:600,fontSize:"0.9rem"}}>
          {correct?"✓ נכון!":"✗ לא נכון"}{!correct&&q.ans&&qType==="multiple"?" — התשובה: "+q.ans:""}
          {q.explain&&<div style={{fontSize:"0.82rem",fontWeight:400,color:C.muted,marginTop:"0.3rem"}}>{q.explain}</div>}
        </div>
      )}

      {/* Hint */}
      {showHint&&<div style={{background:"#f6ad5522",border:"1px solid #f6ad5544",borderRadius:"10px",padding:"0.65rem 1rem",fontSize:"0.85rem",color:"#f6ad55"}}>💡 {hint}</div>}

      {/* Bottom buttons */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:"0.25rem"}}>
        <div style={{display:"flex",gap:"0.5rem"}}>
          <button onClick={()=>goTo(idx-1)} disabled={idx===0} style={{background:"transparent",border:`1px solid ${C.border}`,color:idx===0?C.border:C.muted,padding:"0.5rem 1rem",borderRadius:"10px",fontSize:"0.85rem",cursor:idx===0?"default":"pointer"}}>← אחורה</button>
          {submitted&&idx<questions.length-1&&<button onClick={()=>goTo(idx+1)} style={{background:AI,color:"#fff",border:"none",padding:"0.5rem 1rem",borderRadius:"10px",fontSize:"0.85rem",fontWeight:600,cursor:"pointer"}}>קדימה →</button>}
          {submitted&&idx===questions.length-1&&<button onClick={()=>setIdx(questions.length)} style={{background:C.green,color:"#fff",border:"none",padding:"0.5rem 1rem",borderRadius:"10px",fontSize:"0.85rem",fontWeight:600,cursor:"pointer"}}>סיום 🎉</button>}
        </div>
        <div style={{display:"flex",gap:"0.5rem"}}>
          {!submitted&&<button onClick={getHint} disabled={loading||showHint} style={{background:"#f6ad5522",border:"1px solid #f6ad5544",color:"#f6ad55",padding:"0.5rem 0.9rem",borderRadius:"10px",fontSize:"0.85rem",cursor:loading||showHint?"default":"pointer",opacity:showHint?0.5:1}}>💡 רמז</button>}
          {!submitted&&<button onClick={submit} disabled={!answer.trim()} style={{background:AI,color:"#fff",border:"none",padding:"0.5rem 1.1rem",borderRadius:"10px",fontSize:"0.85rem",fontWeight:600,cursor:"pointer",opacity:!answer.trim()?0.4:1}}>בדוק ✓</button>}
        </div>
      </div>
    </div>
  );
}

function ExamAIMode({ test: initialTest, onBack, user }) {
  const [confirmed,setConfirmed]=React.useState(false);
  const [editedTopics,setEditedTopics]=React.useState(initialTest.topics||"");
  const [editedSubject,setEditedSubject]=React.useState(initialTest.subject||"");
  const [editingSubject,setEditingSubject]=React.useState(false);
  const [extraTopics,setExtraTopics]=React.useState("");
  const [messages,setMessages]=React.useState([]);
  const [input,setInput]=React.useState("");
  const [loading,setLoading]=React.useState(false);
  const [started,setStarted]=React.useState(false);
  const bottomRef=React.useRef(null);
  const AI="#f6855a";
  const test=confirmed?{...initialTest,topics:[editedTopics,extraTopics].filter(Boolean).join(", ")||initialTest.topics}:initialTest;
  const call=async(msgs)=>{setLoading(true);try{const raw=await callAI({system:SYSTEM,messages:msgs.map(m=>({role:m.role,content:m.text})),max_tokens:1000});return raw.replace(/#{1,6}\s?/g,"").replace(/\*\*(.+?)\*\*/g,"").replace(/\*(.+?)\*/g,"").replace(/^\s*[-•]\s/gm,"• ").trim();}catch{return "שגיאה בחיבור.";}finally{setLoading(false);}};
  const topics=[editedTopics,extraTopics].filter(Boolean).join(", ")||initialTest.topics||"";
  const gradeStr=user?.grade?"כיתה "+user.grade:"";const SYSTEM="אתה מורה AI שעוזר לתלמיד להתכונן למבחן."+( gradeStr?"\\n"+getGradeInstructions(user):"")+" מבחן: "+initialTest.title+((editedSubject||initialTest.subject)?"\nמקצוע: "+(editedSubject||initialTest.subject):"\nמקצוע: לא צוין — שאל את התלמיד באיזה מקצוע מדובר")+(topics?"\nנושאים: "+topics:"")+(initialTest.dueDate?"\nתאריך: "+initialTest.dueDate:"")+"\n\nחוקים:\n- אל תשתמש ב-# * ** או markdown. כתוב טקסט רגיל.\n- אל תנחש מקצוע. אם לא צוין, שאל.\n- התאם רמת קושי לכיתה של התלמיד.\n- הסבר מפורט=4-6 משפטים, סיכום=4-5 נקודות, טיפים=1-2 משפטים, אחרת=2-3 משפטים.\n- בסוף כל תשובה הוסף שאלה קצרה.\n- אם הנושאים שהתלמיד כתב לא ברורים לגמרי, מותר לשאול שאלת הבהרה אחת בלבד — רק אם באמת נחוץ. אל תשאל שאלות הבהרה כדרך שגרה.\nדבר בעברית ידידותית.";
  const [selected,setSelected]=React.useState([]);

  const [pendingChoices,setPendingChoices]=React.useState([]);

  // Parse topics into list

  const startWithChoices=async()=>{

    if(!hasQuiz&&chosen.length===0)return;
    const allChosen=[...chosen,...(hasQuiz?[{id:"quiz",label:"✏️ מבחן",text:"quiz"}]:[])] ;
    setChosenOptions(allChosen);
    if(allChosen.length>1){setTopicScreen(true);}
    else{launchChat(allChosen,allChosen[0]);}
  };

  const parseFlashcards=(text)=>{
    const lines=text.split("\n").filter(l=>l.includes("שאלה:")&&l.includes("תשובה:"));
    return lines.map((l,i)=>{
      const q=(l.match(/שאלה:\s*([^|]+)/)||[])[1];
      const a=(l.match(/תשובה:\s*(.+)/)||[])[1];
      return {id:i,q:(q||l).trim(),a:(a||"").trim()};
    });
  };
  const launchChat=async(chosen,first)=>{
    setTopicScreen(false);setStarted(true);
    if(first.id==="quiz"){setQuizMode(true);return;}
    const remaining=chosen.filter(c=>c.id!==first.id);
    setPendingChoices(remaining);
    const t=await call([{role:"user",text:first.text}]);
    setMessages([{role:"assistant",text:t,remaining:remaining.length>0?remaining:null}]);
  };
  const pickChoice=async(choice)=>{
    setPendingChoices([]);
    const remaining=pendingChoices.filter(c=>c.id!==choice.id);
    const m=[{role:"user",text:choice.text}];
    setMessages(prev=>[...prev,{role:"user",text:choice.label}]);
    const t=await call(m);
    const newMsg={role:"assistant",text:t,remaining:remaining.length>0?remaining:null};
        setMessages(prev=>[...prev,newMsg]);
        if(first.id==="flashcards"){const cards=parseFlashcards(t);if(cards.length>0){setFlashcards(cards);setFlashcardMode(true);}}
  };
  const send=async()=>{if(!input.trim()||loading)return;const m=[...messages,{role:"user",text:input.trim()}];setMessages(m);setInput("");const t=await call(m);setMessages(x=>[...x,{role:"assistant",text:t}]);};
  React.useEffect(()=>bottomRef.current?.scrollIntoView({behavior:"smooth"}),[messages,loading]);


  if(!confirmed){

    return (

          <h2 style={{fontSize:"1.1rem",fontWeight:700,margin:0}}>📋 אישור נושאים</h2>
        </div>
        <div style={{background:C.card,border:`2px solid ${AI}44`,borderRadius:"20px",padding:"1.5rem",display:"flex",flexDirection:"column",gap:"1rem"}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:"2.5rem"}}>📋</div><div style={{fontWeight:700,color:AI,fontSize:"1.05rem"}}>{initialTest.title}</div></div>
          <div>
            <div style={{fontSize:"0.8rem",color:C.muted,marginBottom:"0.4rem",fontWeight:600}}>נושאים נוכחיים:</div>

          </div>
          <div>
            <div style={{fontSize:"0.8rem",color:C.muted,marginBottom:"0.4rem",fontWeight:600}}>➕ הוסף נושאים:</div>

          </div>
          <div>
            <div style={{fontSize:"0.8rem",color:C.muted,marginBottom:"0.4rem",fontWeight:600}}>📚 מקצוע:</div>
            {initialTest.subject
              ?<div>
                <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
                  <div style={{flex:1,background:C.border+"44",borderRadius:"8px",padding:"0.55rem 0.85rem",fontSize:"0.9rem",color:AI,fontWeight:600}}>{editedSubject||initialTest.subject}</div>
                  <button onClick={()=>setEditingSubject(s=>!s)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.25rem 0.5rem",borderRadius:"6px",fontSize:"0.72rem",cursor:"pointer",flexShrink:0}}>✏️ שנה</button>
                </div>
                {editingSubject&&<input value={editedSubject} onChange={e=>setEditedSubject(e.target.value)} style={{...inp,marginTop:"0.4rem"}} placeholder="רשום מקצוע חדש..." />}
              </div>
              :<input value={editedSubject} onChange={e=>setEditedSubject(e.target.value)} placeholder="רשום מקצוע (למשל: היסטוריה, אנגלית...)" style={inp} />
            }
          </div>
          <button onClick={()=>{if(!canConfirm)return;setConfirmed(true);}} disabled={!canConfirm} style={{background:canConfirm?C.accent:"#555",color:"#fff",border:`1px solid ${AI}`,padding:"0.75rem",borderRadius:"12px",fontSize:"0.95rem",fontWeight:700,cursor:canConfirm?"pointer":"default",opacity:canConfirm?1:0.4}}>אישור ✓</button>
        </div>
      </div>
    );
  }

  if(topicScreen){
    return (
      <div>
        <div style={{display:"flex",alignItems:"center",gap:"0.75rem",marginBottom:"1.5rem"}}>
          <button onClick={()=>setTopicScreen(false)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.35rem 0.7rem",borderRadius:"8px",fontSize:"0.85rem",cursor:"pointer"}}>← חזרה</button>
          <h2 style={{fontSize:"1.1rem",fontWeight:700,margin:0,color:C.text}}>במה תרצה להתחיל קודם?</h2>
        </div>
        <div style={{background:C.card,border:`2px solid ${AI}44`,borderRadius:"20px",padding:"1.75rem",display:"flex",flexDirection:"column",gap:"0.6rem"}}>
          <div style={{fontSize:"0.85rem",color:C.muted,marginBottom:"0.25rem"}}>בחר מאיפה להתחיל:</div>
          {chosenOptions.map(opt=>(
            <button key={opt.id} onClick={()=>launchChat(chosenOptions,opt)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.text,padding:"0.7rem 1rem",borderRadius:"12px",fontSize:"0.9rem",textAlign:"right",cursor:"pointer",transition:"all 0.15s"}}
              onMouseEnter={e=>{e.currentTarget.style.border=`1px solid ${AI}`;e.currentTarget.style.color=AI;}}
              onMouseLeave={e=>{e.currentTarget.style.border=`1px solid ${C.border}`;e.currentTarget.style.color=C.text;}}>
              {opt.label}

          ))}

      </div>

  if(!started){
    return (
      <div>
        <div style={{display:"flex",alignItems:"center",gap:"0.75rem",marginBottom:"1.5rem"}}>

            })}
          </div>
          <div style={{display:"flex",gap:"0.5rem",marginBottom:"0.75rem"}}>
            <input value={customText} onChange={e=>setCustomText(e.target.value)} placeholder="משהו אחר..." style={{flex:1,background:C.card,border:`1px solid ${C.border}`,color:C.text,padding:"0.55rem 0.85rem",borderRadius:"10px",fontSize:"0.85rem",outline:"none"}} onKeyDown={e=>e.key==="Enter"&&startWithChoices()} />
          </div>
          <button onClick={startWithChoices} disabled={selected.length===0&&!customText.trim()} style={{background:C.accent,color:"#fff",border:`1px solid ${AI}`,padding:"0.65rem",borderRadius:"12px",fontSize:"0.95rem",fontWeight:700,cursor:"pointer",width:"100%",opacity:selected.length===0&&!customText.trim()?0.4:1}}>🚀 התחל צ׳אט</button>
        </div>

  }

  if(started&&flashcardMode&&flashcards.length>0) return (
    <div style={{padding:"0.5rem"}}>
      <div style={{display:"flex",alignItems:"center",gap:"0.75rem",marginBottom:"1.5rem"}}>
        <button onClick={()=>{setFlashcardMode(false);setFlashcards([]);setFcIndex(0);setFcFlipped(false);setStarted(false);setSelected([]);}} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.35rem 0.7rem",borderRadius:"8px",fontSize:"0.85rem",cursor:"pointer"}}>← חזרה</button>
        <h2 style={{fontSize:"1.1rem",fontWeight:700,margin:0,color:C.text}}>📝 כרטיסיות שינון</h2>

        <div onClick={()=>setFcFlipped(v=>!v)} style={{width:"100%",maxWidth:"480px",minHeight:"200px",background:fcFlipped?AI+"22":C.card,border:`2px solid ${fcFlipped?AI:C.border}`,borderRadius:"20px",padding:"2rem",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all 0.2s",textAlign:"center"}}>

          <div style={{fontSize:"1.05rem",fontWeight:fcFlipped?400:700,color:fcFlipped?AI:C.text,lineHeight:1.5}}>{fcFlipped?flashcards[fcIndex].a:flashcards[fcIndex].q}</div>

        <button onClick={()=>{setFcFlipped(false);if(fcIndex+1<flashcards.length)setFcIndex(i=>i+1);}} style={{padding:"0.5rem 1.5rem",borderRadius:"10px",border:`1px solid ${AI}`,background:AI+"22",color:AI,cursor:"pointer",fontSize:"0.9rem",fontWeight:600}}>{fcIndex+1<flashcards.length?"הבאה →":"סיום 🎉"}</button>
      </div>
      <div style={{display:"flex",gap:"0.4rem",justifyContent:"center",marginTop:"1rem",flexWrap:"wrap"}}>
        {flashcards.map((fc,idx)=>(

        ))}
      </div>
    </div>
  );
  if(started&&quizMode) return <AIQuizMode test={initialTest} topics={topics} onBack={()=>{setStarted(false);setQuizMode(false);setSelected([]);}} user={user} />;

          <button onClick={onBack} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.35rem 0.7rem",borderRadius:"8px",fontSize:"0.82rem",cursor:"pointer"}}>← חזרה</button>

        </div>
        <button onClick={()=>{setStarted(false);setMessages([]);setSelected([]);setPendingChoices([]);}} style={{background:"transparent",border:`1px solid ${AI}44`,color:AI,padding:"0.3rem 0.7rem",borderRadius:"8px",fontSize:"0.78rem",cursor:"pointer"}}>🔄 שנה דרך למידה</button>
      </div>
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:"0.75rem",padding:"0.5rem 0"}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-start":"flex-end",flexDirection:"column",alignItems:m.role==="user"?"flex-start":"flex-end"}}>
            <div style={{maxWidth:"85%",background:m.role==="user"?C.card:`linear-gradient(135deg,${C.accent}33,${C.accent}22)`,border:`1px solid ${m.role==="user"?C.border:AI+"44"}`,borderRadius:"14px",padding:"0.75rem 1rem",fontSize:"0.88rem",lineHeight:1.6,whiteSpace:"pre-wrap",color:C.text}}>{m.text}</div>

function SetEditor({ set, onSave, onBack }) {
  const [name,setName]=React.useState(set.name||"");
  const [pairs,setPairs]=React.useState(set.pairs||[]);
  const [newEn,setNewEn]=React.useState("");
  const [newHe,setNewHe]=React.useState("");
  const [suggestions,setSuggestions]=React.useState([]);
  const [loadingSug,setLoadingSug]=React.useState(false);
  const [sugField,setSugField]=React.useState(null); // "he" or "en"
  const sugTimerRef=React.useRef(null);

  const inp={background:C.card,border:`1px solid ${C.border}`,color:C.text,padding:"0.55rem 0.75rem",borderRadius:"8px",fontSize:"0.88rem",outline:"none"};
  const addPair=()=>{if(!newEn.trim()||!newHe.trim())return;setPairs(x=>[...x,{id:genId(),en:newEn.trim(),he:newHe.trim()}]);setNewEn("");setNewHe("");setSuggestions([]);};
  const delPair=id=>setPairs(x=>x.filter(p=>p.id!==id));
  const save=()=>onSave({...set,name,pairs,updatedAt:Date.now()});

  const fetchSuggestions = async (word, toLang) => {
    if(!word||word.trim().length<2){setSuggestions([]);return;}
    setLoadingSug(true);
    setSugField(toLang);
    try {
      const langPair = toLang==="he" ? "en|he" : "he|en";
      const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=${langPair}`);
      const data = await res.json();
      // Only use results with high quality score
      const main = data.responseData?.translatedText||"";
      const mainScore = data.responseData?.match||0;
      const matches = data.matches||[];
      const isHebrew = s => /[\u05D0-\u05EA]/.test(s);
      const isEnglish = s => /^[a-zA-Z\s\-]+$/.test(s);
      const isRightScript = s => toLang==="he" ? isHebrew(s) : isEnglish(s);
      // Filter: must be right script, high quality, not same as input, not gibberish
      const goodMatches = matches
        .filter(m=>m.quality>=70&&m.translation&&isRightScript(m.translation))
        .map(m=>m.translation.trim());
      const mainOk = mainScore>=0.5 && main && isRightScript(main) && main.toLowerCase()!==word.toLowerCase();
      const opts = [...(mainOk?[main]:[]), ...goodMatches]
        .filter(s=>s.length>0&&s.length<40&&!s.includes("PLEASE")&&!s.includes("LIMIT"))
        .map(s=>s.trim())
        .filter((s,i,arr)=>arr.indexOf(s)===i)
        .slice(0,4);
      setSuggestions(opts); // empty array = no suggestions shown
    } catch(e){ setSuggestions([]); }
    setLoadingSug(false);
  };

  const handleEnChange = (val) => {
    setNewEn(val);
    clearTimeout(sugTimerRef.current);
    if(val.trim().length>=2){
      sugTimerRef.current=setTimeout(()=>fetchSuggestions(val,"he"),600);
    } else { setSuggestions([]); }
  };

  const handleHeChange = (val) => {
    setNewHe(val);
    clearTimeout(sugTimerRef.current);
    if(val.trim().length>=2){
      sugTimerRef.current=setTimeout(()=>fetchSuggestions(val,"en"),600);
    } else { setSuggestions([]); }
  };

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:"0.75rem",marginBottom:"1.5rem",flexWrap:"wrap"}}>
        <button onClick={onBack} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.35rem 0.7rem",borderRadius:"8px",fontSize:"0.85rem",cursor:"pointer"}}>← חזרה</button>
        <h2 style={{fontSize:"1.1rem",fontWeight:700,margin:0,flex:1}}>✏️ עריכת ערכה</h2>
        <button onClick={save} style={{background:C.green,color:"#fff",border:"none",padding:"0.42rem 1rem",borderRadius:"8px",fontSize:"0.85rem",fontWeight:600,cursor:"pointer"}}>💾 שמור</button>
      </div>
      <input style={{...inp,width:"100%",marginBottom:"1rem",fontSize:"1rem",fontWeight:600}} placeholder="שם הערכה" value={name} onChange={e=>setName(e.target.value)} />
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"12px",padding:"0.85rem",marginBottom:"0.25rem",display:"flex",gap:"0.5rem",flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:"120px",position:"relative"}}>
          <input style={{...inp,width:"100%",boxSizing:"border-box"}} placeholder="English" value={newEn} onChange={e=>handleEnChange(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addPair()} />
        </div>
        <div style={{flex:1,minWidth:"120px",position:"relative"}}>
          <input style={{...inp,width:"100%",boxSizing:"border-box"}} placeholder="עברית" value={newHe} onChange={e=>handleHeChange(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addPair()} />
        </div>
        <button onClick={addPair} style={{background:C.accent,color:"#fff",border:"none",padding:"0.55rem 1rem",borderRadius:"8px",fontSize:"0.85rem",fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>+ הוסף</button>
      </div>
      {(suggestions.length>0||loadingSug)&&(
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"0.5rem 0.75rem",marginBottom:"1rem",display:"flex",flexWrap:"wrap",gap:"0.4rem",alignItems:"center"}}>
          <span style={{fontSize:"0.75rem",color:C.muted,marginLeft:"0.25rem"}}>{loadingSug?"⏳ מחפש תרגומים...":"💡 הצעות:"}</span>
          {suggestions.map((s,i)=>(
            <button key={i} onClick={()=>{if(sugField==="he")setNewHe(s);else setNewEn(s);setSuggestions([]);}}
              style={{background:C.accent+"22",border:`1px solid ${C.accent}55`,color:C.accent,padding:"0.25rem 0.65rem",borderRadius:"20px",fontSize:"0.82rem",cursor:"pointer",fontWeight:600}}>
              {s}
            </button>
          ))}
        </div>
      )}
      {(suggestions.length===0&&!loadingSug)&&<div style={{marginBottom:"1rem"}}/>}
      {pairs.length===0&&<div style={{textAlign:"center",padding:"2rem",color:C.muted}}>אין מילים עדיין</div>}
      <div style={{display:"flex",flexDirection:"column",gap:"0.4rem"}}>
        {pairs.map((p,i)=>(
          <div key={p.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"0.6rem 1rem",display:"flex",alignItems:"center",gap:"1rem"}}>
            <span style={{color:C.muted,fontSize:"0.8rem",minWidth:"1.5rem"}}>{i+1}.</span>
            <span style={{flex:1,fontWeight:500}}>{p.en}</span>
            <span style={{color:C.muted}}>→</span>
            <span style={{flex:1,color:C.accent}}>{p.he}</span>
            <button onClick={()=>delPair(p.id)} style={{background:"transparent",border:"none",color:"#fc8181",cursor:"pointer",fontSize:"1rem",padding:0}}>✕</button>
          </div>
        ))}
      </div>
    </div>
  );
}

        {flipped&&<div style={{fontSize:"1rem",color:C.accent}}>✓</div>}

      <div style={{display:"flex",gap:"0.75rem",marginTop:"1.25rem",justifyContent:"center"}}>
        <button onClick={prev} disabled={idx===0} style={{background:C.card,border:`1px solid ${C.border}`,color:C.text,padding:"0.55rem 1.4rem",borderRadius:"10px",fontSize:"0.9rem",cursor:"pointer",opacity:idx===0?0.4:1}}>← הקודם</button>
