function ListenAndWrite({ set, settings, setSettings, onBack }) {
  const pairs = set.pairs || [];
  const shuffle = a => [...a].sort(()=>Math.random()-0.5);
  const [queue, setQueue] = React.useState(()=>shuffle([...pairs]));
  const [idx, setIdx] = React.useState(0);
  const [answer, setAnswer] = React.useState("");
  const [submitted, setSubmitted] = React.useState(false);
  const [correct, setCorrect] = React.useState(null);
  const [score, setScore] = React.useState(0);
  const [done, setDone] = React.useState(false);
  const [speaking, setSpeaking] = React.useState(false);
  const [retryQueue, setRetryQueue] = React.useState([]);
  const [round, setRound] = React.useState(1);
  const [showSet, setShowSet] = React.useState(false);
  const inputRef = React.useRef(null);

  const p = queue[idx];
  // word to speak is always the source language
  const wordToSpeak = settings.direction==="he_to_en" ? p?.he : p?.en;
  const correctAns = settings.direction==="he_to_en" ? p?.en : p?.he;
  const speakLang = settings.direction==="he_to_en" ? "he-IL" : "en-US";

  const speak = () => {
    if(!wordToSpeak||!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(wordToSpeak);
    u.lang = speakLang;
    u.rate = 0.75;
    u.pitch = 1.0;
    u.volume = 1.0;
    if(speakLang.startsWith("en")) {
      const voices = window.speechSynthesis.getVoices();
      const preferred =
        voices.find(v=>v.lang==="en-US"&&v.name.includes("Google US English"))||
        voices.find(v=>v.lang==="en-US"&&v.name.includes("Google"))||
        voices.find(v=>v.lang==="en-US"&&v.name.includes("Samantha"))||
        voices.find(v=>v.lang==="en-US"&&v.name.includes("Alex"))||
        voices.find(v=>v.lang==="en-US"&&!v.name.toLowerCase().includes("compact"))||
        voices.find(v=>v.lang.startsWith("en-US"))||
        voices.find(v=>v.lang.startsWith("en"));
      if(preferred) u.voice = preferred;
    }
    u.onstart = ()=>setSpeaking(true);
    u.onend = ()=>setSpeaking(false);
    window.speechSynthesis.speak(u);
  };

  React.useEffect(()=>{ speak(); inputRef.current?.focus(); }, [idx, queue]);
  React.useEffect(()=>()=>window.speechSynthesis?.cancel(), []);

  const submit = () => {
    if(!answer.trim()) return;
    const isCorrect = answer.trim().toLowerCase() === correctAns?.toLowerCase();
    setCorrect(isCorrect);
    setSubmitted(true);
    if(isCorrect) setScore(s=>s+1);
    else setRetryQueue(q=>[...q,p]);
  };

  const next = () => {
    if(idx+1>=queue.length){
      if(retryQueue.length>0){
        setQueue(shuffle([...retryQueue]));
        setRetryQueue([]);
        setIdx(0);
        setRound(r=>r+1);
        setAnswer(""); setSubmitted(false); setCorrect(null);
      } else { setDone(true); }
    } else {
      setIdx(i=>i+1);
      setAnswer(""); setSubmitted(false); setCorrect(null);
    }
  };

  if(pairs.length===0) return <div style={{textAlign:"center",padding:"3rem",color:C.muted}}><button onClick={onBack}>חזרה</button></div>;

  if(done) return (
    <div style={{textAlign:"center",padding:"2rem"}}>
      <div style={{fontSize:"3rem",marginBottom:"1rem"}}>{score/pairs.length>=0.8?"🎉":"📚"}</div>
      <div style={{fontSize:"1.4rem",fontWeight:800,color:C.text,marginBottom:"0.4rem"}}>{score} / {pairs.length}</div>
      {round>1&&<div style={{fontSize:"0.82rem",color:C.accent,marginBottom:"0.4rem",fontWeight:600}}>עברת {round} סבבים!</div>}
      <div style={{color:C.muted,marginBottom:"1.5rem"}}>{score/pairs.length>=0.8?"מצוין!":score/pairs.length>=0.5?"טוב, המשך להתאמן":"כדאי לחזור שוב"}</div>
      <div style={{display:"flex",gap:"0.75rem",justifyContent:"center"}}>
        <button onClick={()=>{setQueue(shuffle([...pairs]));setIdx(0);setScore(0);setDone(false);setRound(1);setRetryQueue([]);setAnswer("");setSubmitted(false);setCorrect(null);}} style={{background:C.accent,color:"#fff",border:"none",padding:"0.65rem 1.5rem",borderRadius:"10px",fontWeight:700,cursor:"pointer"}}>🔄 שוב</button>
        <button onClick={onBack} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.65rem 1.25rem",borderRadius:"10px",cursor:"pointer"}}>← חזרה</button>
      </div>
    </div>
  );

  return (
    <div onClick={()=>showSet&&setShowSet(false)}>
      <div style={{display:"flex",alignItems:"center",gap:"0.75rem",marginBottom:"1rem"}}>
        <button onClick={onBack} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.35rem 0.7rem",borderRadius:"8px",fontSize:"0.85rem",cursor:"pointer"}}>← חזרה</button>
        <div style={{flex:1,textAlign:"center",color:C.muted,fontSize:"0.85rem"}}>{idx+1}/{queue.length} · ✓ {score}{round>1&&<span style={{color:C.accent,marginRight:"0.5rem"}}> סבב {round}</span>}</div>
        <DictSettings settings={settings} setSettings={setSettings} onReset={()=>{setQueue(shuffle([...pairs]));setIdx(0);setScore(0);setDone(false);setRound(1);setRetryQueue([]);setAnswer("");setSubmitted(false);setCorrect(null);}} show={showSet} setShow={setShowSet} />
      </div>

      <div style={{height:"4px",background:C.border,borderRadius:"999px",marginBottom:"1.5rem"}}>
        <div style={{height:"100%",width:((idx/queue.length)*100)+"%",background:C.accent,borderRadius:"999px",transition:"width 0.3s"}}/>
      </div>

      {/* Listen button */}
      <div style={{textAlign:"center",marginBottom:"1.5rem"}}>
        <button onClick={speak} style={{background:speaking?C.accent+"33":C.card,border:`2px solid ${speaking?C.accent:C.border}`,borderRadius:"50%",width:"90px",height:"90px",fontSize:"2.2rem",cursor:"pointer",transition:"all 0.15s",display:"inline-flex",alignItems:"center",justifyContent:"center"}}>
          {speaking?"🔊":"🔈"}
        </button>
        <div style={{fontSize:"0.78rem",color:C.muted,marginTop:"0.6rem"}}>{speaking?"מקריא...":"לחץ להאזנה"}</div>
      </div>

      <input
        ref={inputRef}
        value={answer}
        onChange={e=>setAnswer(e.target.value)}
        onKeyDown={e=>{ if(e.key==="Enter"){ if(!submitted)submit(); else next(); }}}
        disabled={submitted}
        placeholder={settings.direction==="he_to_en"?"כתוב את התרגום לאנגלית...":"כתוב את התרגום לעברית..."}
        style={{width:"100%",background:submitted?(correct?"#48bb7822":"#fc818122"):C.card,border:`2px solid ${submitted?(correct?C.green:"#fc8181"):C.border}`,color:C.text,padding:"0.9rem 1rem",borderRadius:"12px",fontSize:"1rem",outline:"none",boxSizing:"border-box",textAlign:"center",transition:"all 0.2s"}}
      />

      {submitted&&(
        <div style={{marginTop:"0.75rem",background:correct?C.green+"22":"#fc818122",border:`1px solid ${correct?C.green:"#fc8181"}`,borderRadius:"10px",padding:"0.65rem 1rem",textAlign:"center"}}>
          <div style={{fontWeight:700,fontSize:"1rem",color:correct?C.green:"#fc8181",marginBottom:"0.4rem"}}>
            {correct?"✓ נכון!":"✗ לא נכון"}
          </div>
          <div style={{fontSize:"0.92rem",color:C.text,fontWeight:600}}>{p?.he}</div>
          <div style={{fontSize:"0.85rem",color:C.muted,marginTop:"0.2rem"}}>= {p?.en}</div>
          {!correct&&<div style={{fontSize:"0.82rem",color:"#fc8181",marginTop:"0.3rem"}}>התשובה שלך: {answer}</div>}
        </div>
      )}

      <div style={{display:"flex",gap:"0.75rem",marginTop:"1rem"}}>
        {!submitted?(
          <button onClick={submit} style={{flex:1,background:C.accent,color:"#fff",border:"none",padding:"0.7rem",borderRadius:"12px",fontSize:"0.95rem",fontWeight:600,cursor:"pointer"}}>בדוק ✓</button>
        ):(
          <button onClick={next} style={{flex:1,background:C.green,color:"#fff",border:"none",padding:"0.7rem",borderRadius:"12px",fontSize:"0.95rem",fontWeight:600,cursor:"pointer"}}>{idx+1>=queue.length&&retryQueue.length===0?"סיום 🎉":"הבא →"}</button>
        )}
        <button onClick={speak} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.7rem 1rem",borderRadius:"12px",fontSize:"1rem",cursor:"pointer"}}>🔊</button>
      </div>
    </div>
  );
}

function DictationFlashcards({ set, onBack, settings, setSettings }) {
  const pairs = (set.pairs||[]);
  const shuffle = a => [...a].sort(()=>Math.random()-0.5);
  const buildOrder = () => (settings.order||"random")==="random" ? shuffle(pairs.map((_,i)=>i)) : pairs.map((_,i)=>i);
  const [idx, setIdx] = React.useState(0);
  const [flipped, setFlipped] = React.useState(false);
  const [order, setOrder] = React.useState(()=>buildOrder());
  const [showSet, setShowSet] = React.useState(false);
  const [autoMode, setAutoMode] = React.useState(false);
  const autoRef = React.useRef(null);

  const getQ = p => settings.direction==="he_to_en" ? p.he : p.en;
  const getA = p => settings.direction==="he_to_en" ? p.en : p.he;
  const getLangQ = () => settings.direction==="he_to_en" ? "he-IL" : "en-US";
  const getLangA = () => settings.direction==="he_to_en" ? "en-US" : "he-IL";

  const speak = (text, lang, onDone) => {
    if(!window.speechSynthesis) { onDone&&onDone(); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = 0.75;
    u.pitch = 1.0;
    u.volume = 1.0;
    if(lang.startsWith("en")) {
      const voices = window.speechSynthesis.getVoices();
      const preferred =
        voices.find(v=>v.lang==="en-US"&&v.name.includes("Google US English"))||
        voices.find(v=>v.lang==="en-US"&&v.name.includes("Google"))||
        voices.find(v=>v.lang==="en-US"&&v.name.includes("Samantha"))||
        voices.find(v=>v.lang==="en-US"&&v.name.includes("Alex"))||
        voices.find(v=>v.lang==="en-US"&&!v.name.toLowerCase().includes("compact"))||
        voices.find(v=>v.lang.startsWith("en-US"))||
        voices.find(v=>v.lang.startsWith("en"));
      if(preferred) u.voice = preferred;
    }
    u.onend = () => onDone&&onDone();
    window.speechSynthesis.speak(u);
  };

  const reset = () => { setOrder(buildOrder()); setIdx(0); setFlipped(false); stopAuto(); };
  React.useEffect(()=>{ setOrder(buildOrder()); setIdx(0); setFlipped(false); stopAuto(); }, [settings.order, settings.direction]);
  React.useEffect(()=>()=>{ window.speechSynthesis?.cancel(); clearTimeout(autoRef.current); }, []);

  const stopAuto = () => { setAutoMode(false); window.speechSynthesis?.cancel(); clearTimeout(autoRef.current); };

  const runAutoCard = (currentIdx, currentOrder) => {
    const p = pairs[currentOrder[currentIdx]];
    if(!p) { stopAuto(); return; }
    setFlipped(false);
    speak(getQ(p), getLangQ(), () => {
      autoRef.current = setTimeout(() => {
        setFlipped(true);
        speak(getA(p), getLangA(), () => {
          autoRef.current = setTimeout(() => {
            const nextIdx = currentIdx + 1;
            if(nextIdx < currentOrder.length) {
              setIdx(nextIdx);
              runAutoCard(nextIdx, currentOrder);
            } else {
              stopAuto();
            }
          }, 1200);
        });
      }, 1500);
    });
  };

  const toggleAuto = () => {
    if(autoMode) { stopAuto(); return; }
    setAutoMode(true);
    runAutoCard(idx, order);
  };

  if(pairs.length===0) return <div style={{textAlign:"center",padding:"3rem",color:C.muted}}><button onClick={onBack}>חזרה</button></div>;
  const p = pairs[order[idx]];

  return (
    <div onClick={()=>showSet&&setShowSet(false)}>
      <div style={{display:"flex",alignItems:"center",gap:"0.75rem",marginBottom:"1.5rem"}}>
        <button onClick={()=>{stopAuto();onBack();}} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.35rem 0.7rem",borderRadius:"8px",fontSize:"0.85rem",cursor:"pointer"}}>← חזרה</button>
        <div style={{flex:1,textAlign:"center",color:C.muted,fontSize:"0.85rem"}}>{idx+1} / {pairs.length}</div>
        <DictSettings settings={settings} setSettings={setSettings} onReset={reset} show={showSet} setShow={setShowSet} />
      </div>
      <div style={{position:"relative",marginBottom:"1.5rem"}}>
        <div onClick={()=>{ if(!autoMode){setFlipped(v=>!v);} }} style={{minHeight:"200px",background:flipped?C.accent+"22":C.card,border:`2px solid ${flipped?C.accent:C.border}`,borderRadius:"20px",padding:"2.5rem 1.5rem",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:autoMode?"default":"pointer",textAlign:"center",transition:"all 0.2s"}}>
          <div style={{fontSize:"0.75rem",color:C.muted,marginBottom:"0.75rem"}}>{autoMode?"🔊 מצב אוטו...":flipped?"תרגום":"לחץ לראות תרגום"}</div>
          <div style={{fontSize:"1.5rem",fontWeight:800,color:flipped?C.accent:C.text}}>{flipped?getA(p):getQ(p)}</div>
        </div>
        <button onClick={e=>{e.stopPropagation();speak(flipped?getA(p):getQ(p), flipped?getLangA():getLangQ(), null);}} style={{position:"absolute",top:"0.6rem",left:"0.6rem",background:"transparent",border:"none",fontSize:"1.2rem",cursor:"pointer",color:C.muted,padding:"0.25rem",lineHeight:1,borderRadius:"6px"}} title="השמע מילה">🔊</button>
      </div>
      <div style={{display:"flex",gap:"0.6rem",marginBottom:"0.75rem"}}>
        <button onClick={()=>{if(!autoMode){setIdx(i=>Math.max(0,i-1));setFlipped(false);}}} disabled={idx===0||autoMode} style={{flex:1,padding:"0.65rem",borderRadius:"10px",border:`1px solid ${C.border}`,background:"transparent",color:idx===0||autoMode?C.muted:C.text,cursor:idx===0||autoMode?"default":"pointer"}}>← הקודמת</button>
        <button onClick={()=>{if(!autoMode&&idx+1<pairs.length){setIdx(i=>i+1);setFlipped(false);}}} disabled={idx+1>=pairs.length||autoMode} style={{flex:1,padding:"0.65rem",borderRadius:"10px",border:`1px solid ${C.border}`,background:"transparent",color:idx+1>=pairs.length||autoMode?C.muted:C.text,cursor:idx+1>=pairs.length||autoMode?"default":"pointer"}}>הבאה →</button>
      </div>
      <button onClick={toggleAuto} style={{width:"100%",padding:"0.65rem",borderRadius:"10px",border:`1px solid ${autoMode?C.accent:C.border}`,background:autoMode?C.accent+"22":"transparent",color:autoMode?C.accent:C.text,cursor:"pointer",fontWeight:autoMode?700:400,fontSize:"0.9rem",display:"flex",alignItems:"center",justifyContent:"center",gap:"0.5rem"}}>
        {autoMode?"⏹️ עצור אוטו":"▶️ אוטו — מקריא ומציג לבד"}
      </button>
      <div style={{display:"flex",gap:"0.35rem",justifyContent:"center",marginTop:"1rem",flexWrap:"wrap"}}>
        {pairs.map((_,i)=>(
          <div key={i} onClick={()=>{if(!autoMode){setIdx(i);setFlipped(false);}}} style={{width:"10px",height:"10px",borderRadius:"50%",background:i===idx?C.accent:C.border,cursor:autoMode?"default":"pointer"}}/>
        ))}
      </div>
    </div>
  );
}

function DictationExam({ set, settings, setSettings, onBack }) {
  const pairs = set.pairs || [];
  const getQ = p => settings.direction === "he_to_en" ? p.he : p.en;
  const getA = p => settings.direction === "he_to_en" ? p.en : p.he;
  const [answers, setAnswers] = React.useState(() => pairs.map(() => ""));
  const [submitted, setSubmitted] = React.useState(false);
  const [currentIdx, setCurrentIdx] = React.useState(0);
  const [showExamSet, setShowExamSet] = React.useState(false);
  const inputRef = React.useRef(null);

  React.useEffect(() => { if(inputRef.current) inputRef.current.focus(); }, [currentIdx]);

  if(pairs.length === 0) return <div style={{textAlign:"center",padding:"3rem",color:C.muted}}><button onClick={onBack}>חזרה</button></div>;

  const score = pairs.filter((p,i) => answers[i].trim().toLowerCase() === getA(p).toLowerCase()).length;

  if(submitted) return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:"0.75rem",marginBottom:"1.5rem"}}>
        <button onClick={onBack} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.35rem 0.7rem",borderRadius:"8px",fontSize:"0.85rem",cursor:"pointer"}}>← חזרה</button>
        <h2 style={{flex:1,fontSize:"1.15rem",fontWeight:700,margin:0,color:C.text}}>תוצאות המבחן</h2>
      </div>
      <div style={{textAlign:"center",padding:"1.25rem",background:score/pairs.length>=0.8?C.green+"22":score/pairs.length>=0.5?"#f6ad5522":"#fc818122",border:`1px solid ${score/pairs.length>=0.8?C.green:score/pairs.length>=0.5?"#f6ad55":"#fc8181"}`,borderRadius:"16px",marginBottom:"1.5rem"}}>
        <div style={{fontSize:"2.5rem",marginBottom:"0.5rem"}}>{score/pairs.length>=0.8?"🎉":score/pairs.length>=0.5?"📚":"💪"}</div>
        <div style={{fontSize:"1.4rem",fontWeight:800,color:C.text}}>{score} / {pairs.length}</div>
        <div style={{color:C.muted,fontSize:"0.88rem",marginTop:"0.25rem"}}>{score/pairs.length>=0.8?"מצוין!":score/pairs.length>=0.5?"טוב, המשך להתאמן":"כדאי לחזור שוב"}</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"0.6rem"}}>
        {pairs.map((p,i) => {
          const correct = answers[i].trim().toLowerCase() === getA(p).toLowerCase();
          return (
            <div key={i} style={{display:"flex",alignItems:"center",gap:"0.75rem",padding:"0.65rem 0.9rem",background:correct?C.green+"15":"#fc818115",border:`1px solid ${correct?C.green+"55":"#fc818155"}`,borderRadius:"10px"}}>
              <span style={{fontSize:"1.1rem"}}>{correct?"✓":"✗"}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:"0.88rem",color:C.text}}>{getQ(p)}</div>
                {!correct&&<div style={{fontSize:"0.78rem",color:C.muted}}>כתבת: <span style={{color:"#fc8181"}}>{answers[i]||"(לא ענית)"}</span> · נכון: <span style={{color:C.green,fontWeight:700}}>{getA(p)}</span></div>}
              </div>
            </div>
          );
        })}
      </div>
      <button onClick={()=>{setAnswers(pairs.map(()=>""));setSubmitted(false);setCurrentIdx(0);}} style={{width:"100%",marginTop:"1.25rem",background:C.accent,color:"#fff",border:"none",padding:"0.7rem",borderRadius:"12px",fontSize:"0.95rem",fontWeight:600,cursor:"pointer"}}>🔄 נסה שוב</button>
    </div>
  );

  const p = pairs[currentIdx];
  const progress = (currentIdx / pairs.length) * 100;

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:"0.75rem",marginBottom:"1rem"}}>
        <button onClick={onBack} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.35rem 0.7rem",borderRadius:"8px",fontSize:"0.85rem",cursor:"pointer"}}>← חזרה</button>
        <div style={{flex:1,textAlign:"center",color:C.muted,fontSize:"0.85rem"}}>{currentIdx+1} / {pairs.length}</div>
        <ExamSettings settings={settings} setSettings={setSettings} onReset={()=>{setAnswers(pairs.map(()=>""));setSubmitted(false);setCurrentIdx(0);}} show={showExamSet} setShow={setShowExamSet} />
      </div>
      <div style={{height:"4px",background:C.border,borderRadius:"999px",marginBottom:"1.5rem"}}>
        <div style={{height:"100%",width:progress+"%",background:C.accent,borderRadius:"999px",transition:"width 0.3s"}}/>
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"16px",padding:"1.75rem",textAlign:"center",marginBottom:"1.25rem"}}>
        <div style={{fontSize:"0.78rem",color:C.muted,marginBottom:"0.5rem"}}>{settings.direction==="he_to_en"?"תרגם לאנגלית":"תרגם לעברית"}</div>
        <div style={{fontSize:"1.5rem",fontWeight:800,color:C.text}}>{getQ(p)}</div>
      </div>
      <input
        ref={inputRef}
        value={answers[currentIdx]}
        onChange={e=>setAnswers(prev=>{const n=[...prev];n[currentIdx]=e.target.value;return n;})}
        onKeyDown={e=>{
          if(e.key==="Enter"){
            if(currentIdx+1<pairs.length) setCurrentIdx(i=>i+1);
            else setSubmitted(true);
          }
        }}
        placeholder="כתוב את התשובה..."
        style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,color:C.text,padding:"0.85rem 1rem",borderRadius:"12px",fontSize:"1rem",outline:"none",boxSizing:"border-box",textAlign:"center"}}
      />
      <div style={{display:"flex",gap:"0.6rem",marginTop:"1rem"}}>
        {currentIdx>0&&<button onClick={()=>setCurrentIdx(i=>i-1)} style={{flex:1,background:"transparent",border:`1px solid ${C.border}`,color:C.text,padding:"0.65rem",borderRadius:"10px",fontSize:"0.9rem",cursor:"pointer"}}>← הקודם</button>}
        <button onClick={()=>{if(currentIdx+1<pairs.length)setCurrentIdx(i=>i+1);else setSubmitted(true);}} style={{flex:2,background:currentIdx+1>=pairs.length?C.accent:"transparent",border:`1px solid ${currentIdx+1>=pairs.length?C.accent:C.border}`,color:currentIdx+1>=pairs.length?"#fff":C.text,padding:"0.65rem",borderRadius:"10px",fontSize:"0.9rem",fontWeight:currentIdx+1>=pairs.length?700:400,cursor:"pointer"}}>
          {currentIdx+1>=pairs.length?"סיום וראה תוצאות ✓":"הבא →"}
        </button>
      </div>
    </div>
  );
}

const QMSettings = DictSettings;
const ExamSettings = DictSettings;

function QuizMode({ set, settings, setSettings, onBack, user }) {
  const pairs=set.pairs||[];
  const getQ=p=>settings.direction==="en_to_he"?p.en:settings.direction==="he_to_en"?p.he:[p.en,p.he][Math.floor(Math.random()*2)];
  const getA=p=>settings.direction==="en_to_he"?p.he:settings.direction==="he_to_en"?p.en:(getQ(p)===p.en?p.he:p.en);
  const shuffle=a=>[...a].sort(()=>Math.random()-0.5);
  const [queue,setQueue]=React.useState(()=>shuffle([...pairs]));
  const [retryQueue,setRetryQueue]=React.useState([]);
  const [idx,setIdx]=React.useState(0);
  const [showQMSet,setShowQMSet]=React.useState(false);
  const [answer,setAnswer]=React.useState("");
  const [submitted,setSubmitted]=React.useState(false);
  const [correct,setCorrect]=React.useState(null);
  const [score,setScore]=React.useState(0);
  const [done,setDone]=React.useState(false);
  const [options,setOptions]=React.useState([]);
  const [round,setRound]=React.useState(1);
  const p=queue[idx];
  React.useEffect(()=>{
    if(settings.mode==="multiple"&&p){
      const correctAns=getA(p);
      const wrong=shuffle(pairs.filter(x=>x.id!==p.id)).slice(0,3).map(x=>settings.direction==="en_to_he"?x.he:settings.direction==="he_to_en"?x.en:(getQ(p)===p.en?x.he:x.en));
      setOptions(shuffle([correctAns,...wrong]));
    }
    setAnswer("");setSubmitted(false);setCorrect(null);
  },[idx,p?.id,queue]);
  const submit=()=>{
    if(!answer.trim()&&settings.mode!=="multiple")return;
    const a=getA(p);
    const isCorrect=settings.mode==="multiple"?answer===a:answer.trim().toLowerCase()===a.toLowerCase();
    setCorrect(isCorrect);
    setSubmitted(true);
    if(isCorrect)setScore(s=>s+1);
    else setRetryQueue(q=>[...q,p]);
  };
  const next=()=>{
    if(idx+1>=queue.length){
      if(retryQueue.length>0){
        // Start retry round with wrong answers
        setQueue(shuffle([...retryQueue]));
        setRetryQueue([]);
        setIdx(0);
        setRound(r=>r+1);
      } else {
        setDone(true);
      }
    } else {
      setIdx(i=>i+1);
    }
  };
  if(pairs.length===0) return <div style={{textAlign:"center",padding:"3rem",color:C.muted}}><button onClick={onBack}>חזרה</button></div>;
  if(done) return (
    <div style={{textAlign:"center",padding:"3rem"}}>
      <div style={{fontSize:"3rem",marginBottom:"1rem"}}>{score/pairs.length>=0.8?"🎉":"📚"}</div>
      <div style={{fontSize:"1.3rem",fontWeight:700,marginBottom:"0.5rem"}}>{score}/{pairs.length} נכון</div>
      {round>1&&<div style={{fontSize:"0.82rem",color:C.accent,marginBottom:"0.4rem",fontWeight:600}}>✓ עברת {round} סבבים עד שידעת הכל!</div>}
      <div style={{color:C.muted,marginBottom:"1.5rem"}}>{score/pairs.length>=0.8?"מצוין!":score/pairs.length>=0.5?"טוב, המשך להתאמן":"כדאי לחזור שוב"}</div>
      <div style={{display:"flex",gap:"0.75rem",justifyContent:"center",flexWrap:"wrap"}}>
        <button onClick={()=>{setIdx(0);setScore(0);setDone(false);}} style={{background:C.accent,color:"#fff",border:"none",padding:"0.6rem 1.25rem",borderRadius:"10px",fontSize:"0.9rem",fontWeight:600,cursor:"pointer"}}>🔄 שוב</button>
        <button onClick={onBack} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.text,padding:"0.6rem 1.25rem",borderRadius:"10px",fontSize:"0.9rem",cursor:"pointer"}}>← חזרה</button>
      </div>
    </div>
  );
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:"0.75rem",marginBottom:"1.5rem"}}>
        <button onClick={onBack} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.35rem 0.7rem",borderRadius:"8px",fontSize:"0.85rem",cursor:"pointer"}}>← חזרה</button>
        <div style={{flex:1,textAlign:"center",color:C.muted,fontSize:"0.85rem"}}>{idx+1}/{queue.length} · ✓ {score}</div>
        {round>1&&<div style={{background:C.accent+"22",color:C.accent,fontSize:"0.75rem",fontWeight:700,padding:"0.2rem 0.6rem",borderRadius:"20px"}}>🔄 סבב {round}</div>}
        <QMSettings settings={settings} setSettings={setSettings} onReset={()=>{setQueue(shuffle([...pairs]));setRetryQueue([]);setIdx(0);setScore(0);setDone(false);setRound(1);}} show={showQMSet} setShow={setShowQMSet} />
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"16px",padding:"1.5rem",textAlign:"center",marginBottom:"1.25rem"}}>
        <div style={{fontSize:"1.4rem",fontWeight:700}}>{getQ(p)}</div>
      </div>
      {settings.mode==="multiple"?(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.6rem",marginBottom:"1rem"}}>
          {options.map(opt=>(
            <button key={opt} onClick={()=>{if(!submitted){setAnswer(opt);setTimeout(()=>{const isC=opt===getA(p);setCorrect(isC);setSubmitted(true);if(isC)setScore(s=>s+1);},0);}}} style={{background:submitted?(opt===getA(p)?C.green+"33":opt===answer&&!correct?"#fc818133":C.card):C.card,border:`1px solid ${submitted?(opt===getA(p)?C.green:opt===answer&&!correct?"#fc8181":C.border):C.border}`,color:C.text,padding:"0.75rem",borderRadius:"12px",fontSize:"0.9rem",cursor:"pointer",fontWeight:submitted&&opt===getA(p)?700:400}}>{opt}</button>
          ))}
        </div>
      ):(
        <div style={{marginBottom:"1rem"}}>
          <input value={answer} onChange={e=>setAnswer(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!submitted&&submit()} disabled={submitted} placeholder="הכנס תשובה..." style={{background:C.card,border:`2px solid ${submitted?(correct?C.green:"#fc8181"):C.border}`,color:C.text,padding:"0.75rem 1rem",borderRadius:"12px",fontSize:"1rem",outline:"none",width:"100%",textAlign:"center"}} />
        </div>
      )}
      {submitted&&<div style={{background:correct?C.green+"22":"#fc818122",border:`1px solid ${correct?C.green:"#fc8181"}`,borderRadius:"12px",padding:"0.75rem 1rem",textAlign:"center",marginBottom:"1rem",fontWeight:600,color:correct?C.green:"#fc8181"}}>{correct?"✓ נכון!":"✗ לא נכון — התשובה: "+getA(p)}</div>}
      {(!submitted&&settings.mode!=="multiple")&&<button onClick={submit} style={{width:"100%",background:C.accent,color:"#fff",border:"none",padding:"0.7rem",borderRadius:"12px",fontSize:"0.95rem",fontWeight:600,cursor:"pointer"}}>בדוק</button>}
      {submitted&&<button onClick={next} style={{width:"100%",background:C.green,color:"#fff",border:"none",padding:"0.7rem",borderRadius:"12px",fontSize:"0.95rem",fontWeight:600,cursor:"pointer"}}>{idx+1>=pairs.length?"סיום 🎉":"הבא →"}</button>}
    </div>
  );
}

function GradesTracker({ user, saveUser }) {
  const grades = user.gradesData || {};
  const [newSubject, setNewSubject] = React.useState("");
  const [newGrade, setNewGrade] = React.useState("");
  const [newLabel, setNewLabel] = React.useState("");
  const [selectedSubject, setSelectedSubject] = React.useState(null);
  const [showAddSubject, setShowAddSubject] = React.useState(false);
  const [newSubjectName, setNewSubjectName] = React.useState("");
  const [goalInput, setGoalInput] = React.useState("");
  const [showSummary, setShowSummary] = React.useState(false);

  const saveGrades = (data) => saveUser({...user, gradesData: data});

  const addSubject = () => {
    if(!newSubjectName.trim()) return;
    const key = newSubjectName.trim();
    if(grades[key]) return;
    saveGrades({...grades, [key]: {entries:[], goal: null}});
    setNewSubjectName(""); setShowAddSubject(false);
    setSelectedSubject(key);
  };

  const addEntry = (subject) => {
    const g = parseFloat(newGrade);
    if(!newGrade || isNaN(g) || g<0 || g>100) return;
    const entry = {id:genId(), label:newLabel.trim()||"ציון", grade:g, date:Date.now()};
    const subj = grades[subject] || {entries:[], goal:null};
    const updated = {...grades, [subject]: {...subj, entries:[...( subj.entries||[]), entry]}};
    saveGrades(updated);
    setNewGrade(""); setNewLabel("");
  };

  const deleteEntry = (subject, id) => {
    const subj = grades[subject];
    saveGrades({...grades, [subject]: {...subj, entries:(subj.entries||[]).filter(e=>e.id!==id)}});
  };

  const setGoal = (subject) => {
    const g = parseFloat(goalInput);
    if(isNaN(g)||g<0||g>100) return;
    saveGrades({...grades, [subject]: {...grades[subject], goal:g}});
    setGoalInput("");
  };

  const deleteSubject = (subject) => {
    const copy = {...grades};
    delete copy[subject];
    saveGrades(copy);
    if(selectedSubject===subject) setSelectedSubject(null);
  };

  const getAvg = (entries) => {
    if(!entries||entries.length===0) return null;
    return Math.round(entries.reduce((s,e)=>s+e.grade,0)/entries.length*10)/10;
  };

  const getTrend = (entries) => {
    if(!entries||entries.length<2) return null;
    const last3 = entries.slice(-3);
    const first = last3[0].grade, last = last3[last3.length-1].grade;
    return last - first;
  };

  const getColor = (g) => g>=90?"#48bb78":g>=75?C.accent:g>=60?"#f6ad55":"#fc8181";

  const subjects = Object.keys(grades);
  const inp = {background:C.card,border:`1px solid ${C.border}`,color:C.text,padding:"0.45rem 0.7rem",borderRadius:"8px",fontSize:"0.85rem",outline:"none"};

  const selected = selectedSubject && grades[selectedSubject];

  return (
    <div style={{display:"flex",flexDirection:"column",gap:"1rem"}}>

      {/* Subject list */}
      <div style={{display:"flex",flexWrap:"wrap",gap:"0.5rem",alignItems:"center"}}>
        {subjects.map(s => {
          const avg = getAvg(grades[s].entries);
          const trend = getTrend(grades[s].entries);
          const isActive = selectedSubject===s;
          return (
            <button key={s} onClick={()=>setSelectedSubject(isActive?null:s)}
              style={{padding:"0.45rem 0.85rem",borderRadius:"12px",border:`1px solid ${isActive?C.accent:C.border}`,background:isActive?C.accent+"22":"transparent",color:isActive?C.accent:C.text,cursor:"pointer",display:"flex",alignItems:"center",gap:"0.4rem",fontSize:"0.88rem",fontWeight:isActive?700:400}}>
              <span>{s}</span>
              {avg!==null&&<span style={{background:getColor(avg),color:"#fff",borderRadius:"8px",padding:"0.05rem 0.4rem",fontSize:"0.75rem",fontWeight:700}}>{avg}</span>}
              {trend!==null&&<span style={{fontSize:"0.72rem",color:trend>0?"#48bb78":trend<0?"#fc8181":C.muted}}>{trend>0?"↑":trend<0?"↓":"→"}</span>}
            </button>
          );
        })}
        {showAddSubject?(
          <div style={{display:"flex",gap:"0.4rem",alignItems:"center"}}>
            <input style={{...inp,width:"120px"}} placeholder="שם מקצוע" value={newSubjectName} onChange={e=>setNewSubjectName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSubject()} autoFocus />
            <button onClick={addSubject} style={{background:C.accent,color:"#fff",border:"none",borderRadius:"8px",padding:"0.45rem 0.7rem",cursor:"pointer",fontSize:"0.82rem"}}>הוסף</button>
            <button onClick={()=>setShowAddSubject(false)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:"8px",padding:"0.45rem 0.7rem",cursor:"pointer",fontSize:"0.82rem"}}>✕</button>
          </div>
        ):(
          <button onClick={()=>setShowAddSubject(true)} style={{padding:"0.45rem 0.85rem",borderRadius:"12px",border:`1px dashed ${C.border}`,background:"transparent",color:C.muted,cursor:"pointer",fontSize:"0.85rem"}}>+ מקצוע</button>
        )}
        {subjects.length>0&&(
          <button onClick={()=>setShowSummary(v=>!v)} style={{padding:"0.45rem 0.85rem",borderRadius:"12px",border:`1px solid ${showSummary?C.accent:C.border}`,background:showSummary?C.accent+"22":"transparent",color:showSummary?C.accent:C.muted,cursor:"pointer",fontSize:"0.85rem",fontWeight:showSummary?700:400}}>
            📈 סיכום כללי
          </button>
        )}
      </div>

      {/* Summary Panel */}
      {showSummary&&subjects.length>0&&(()=>{
        const subjData = subjects.map(s=>{
          const entries = grades[s].entries||[];
          const avg = entries.length>0 ? Math.round(entries.reduce((a,e)=>a+e.grade,0)/entries.length*10)/10 : null;
          const trend = getTrend(entries);
          const goal = grades[s].goal;
          return {name:s, avg, trend, goal, count:entries.length};
        }).filter(s=>s.avg!==null);
        const overallAvg = subjData.length>0 ? Math.round(subjData.reduce((a,s)=>a+s.avg,0)/subjData.length*10)/10 : null;
        const best = subjData.length>0 ? subjData.reduce((a,b)=>b.avg>a.avg?b:a) : null;
        const worst = subjData.length>0 ? subjData.reduce((a,b)=>b.avg<a.avg?b:a) : null;
        const improving = subjData.filter(s=>s.trend>0).length;
        return (
          <div style={{background:C.card,borderRadius:"16px",border:`1px solid ${C.border}`,overflow:"hidden"}}>
            {/* Overall stats */}
            <div style={{padding:"1rem",borderBottom:`1px solid ${C.border}`,display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:"120px",textAlign:"center",padding:"0.6rem",background:overallAvg?getColor(overallAvg)+"18":"transparent",borderRadius:"12px",border:`1px solid ${overallAvg?getColor(overallAvg)+"44":C.border}`}}>
                <div style={{fontSize:"2rem",fontWeight:800,color:overallAvg?getColor(overallAvg):C.muted}}>{overallAvg||"—"}</div>
                <div style={{fontSize:"0.75rem",color:C.muted,marginTop:"0.1rem"}}>ממוצע כללי</div>
              </div>
              {best&&<div style={{flex:1,minWidth:"100px",textAlign:"center",padding:"0.6rem",background:"#48bb7818",borderRadius:"12px",border:"1px solid #48bb7844"}}>
                <div style={{fontSize:"1.3rem",fontWeight:700,color:"#48bb78"}}>{best.avg}</div>
                <div style={{fontSize:"0.72rem",color:C.muted}}>🏆 {best.name}</div>
              </div>}
              {worst&&worst.name!==best?.name&&<div style={{flex:1,minWidth:"100px",textAlign:"center",padding:"0.6rem",background:"#fc818118",borderRadius:"12px",border:"1px solid #fc818144"}}>
                <div style={{fontSize:"1.3rem",fontWeight:700,color:"#fc8181"}}>{worst.avg}</div>
                <div style={{fontSize:"0.72rem",color:C.muted}}>💪 {worst.name}</div>
              </div>}
              {improving>0&&<div style={{flex:1,minWidth:"100px",textAlign:"center",padding:"0.6rem",background:C.accent+"18",borderRadius:"12px",border:`1px solid ${C.accent}44`}}>
                <div style={{fontSize:"1.3rem",fontWeight:700,color:C.accent}}>{improving}</div>
                <div style={{fontSize:"0.72rem",color:C.muted}}>📈 מקצועות בעלייה</div>
              </div>}
            </div>
            {/* Per-subject breakdown */}
            <div style={{padding:"0.5rem 0"}}>
              {subjData.sort((a,b)=>b.avg-a.avg).map(s=>{
                const pct = Math.min(s.avg,100);
                const goalPct = s.goal ? Math.min(s.goal,100) : null;
                return (
                  <div key={s.name} style={{padding:"0.5rem 1rem",borderBottom:`1px solid ${C.border}22`}}>
                    <div style={{display:"flex",alignItems:"center",gap:"0.5rem",marginBottom:"0.3rem"}}>
                      <span style={{flex:1,fontWeight:600,fontSize:"0.88rem",color:C.text}}>{s.name}</span>
                      <span style={{fontSize:"0.75rem",color:C.muted}}>{s.count} ציונים</span>
                      {s.trend!==null&&<span style={{fontSize:"0.75rem",fontWeight:600,color:s.trend>0?"#48bb78":s.trend<0?"#fc8181":C.muted}}>{s.trend>0?`↑+${Math.round(s.trend*10)/10}`:s.trend<0?`↓${Math.round(s.trend*10)/10}`:"→"}</span>}
                      <span style={{fontWeight:800,fontSize:"0.95rem",color:getColor(s.avg),minWidth:"32px",textAlign:"left"}}>{s.avg}</span>
                    </div>
                    <div style={{position:"relative",height:"8px",background:C.border,borderRadius:"10px",overflow:"visible"}}>
                      <div style={{height:"100%",width:`${pct}%`,background:getColor(s.avg),borderRadius:"10px",transition:"width 0.4s"}}/>
                      {goalPct&&<div style={{position:"absolute",top:"-3px",left:`${goalPct}%`,transform:"translateX(-50%)",fontSize:"0.65rem",color:C.accent,lineHeight:1}}>🎯</div>}
                    </div>
                    {s.goal&&<div style={{fontSize:"0.7rem",color:s.avg>=s.goal?"#48bb78":"#f6ad55",marginTop:"0.2rem",textAlign:"left"}}>{s.avg>=s.goal?`✅ הגעת ליעד ${s.goal}`:`יעד: ${s.goal} — חסר ${Math.round((s.goal-s.avg)*10)/10} נקודות`}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* Selected subject detail */}
      {selectedSubject&&selected&&(
        <div style={{background:C.card,borderRadius:"16px",border:`1px solid ${C.border}`,overflow:"hidden"}}>

          {/* Header */}
          <div style={{padding:"0.85rem 1rem",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:"0.75rem"}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:"1rem",color:C.text}}>{selectedSubject}</div>
              {(()=>{
                const avg=getAvg(selected.entries);
                const trend=getTrend(selected.entries);
                const goal=selected.goal;
                return avg!==null&&(
                  <div style={{display:"flex",gap:"0.75rem",marginTop:"0.2rem",alignItems:"center",flexWrap:"wrap"}}>
                    <span style={{fontSize:"0.82rem",color:C.muted}}>ממוצע: <b style={{color:getColor(avg),fontSize:"0.95rem"}}>{avg}</b></span>
                    {trend!==null&&<span style={{fontSize:"0.78rem",color:trend>0?"#48bb78":trend<0?"#fc8181":C.muted}}>{trend>0?"📈 עולה":"📉 יורד"} ({trend>0?"+":""}{Math.round(trend*10)/10} נקודות)</span>}
                    {goal&&<span style={{fontSize:"0.78rem",color:avg>=goal?"#48bb78":"#f6ad55"}}>יעד: {goal} {avg>=goal?"✅":`(חסר ${Math.round((goal-avg)*10)/10})`}</span>}
                  </div>
                );
              })()}
            </div>
            {/* Goal setter */}
            <div style={{display:"flex",gap:"0.4rem",alignItems:"center"}}>
              <input style={{...inp,width:"60px",textAlign:"center"}} placeholder="יעד" value={goalInput} onChange={e=>setGoalInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&setGoal(selectedSubject)} />
              <button onClick={()=>setGoal(selectedSubject)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:"8px",padding:"0.35rem 0.5rem",cursor:"pointer",fontSize:"0.75rem"}}>קבע</button>
            </div>
            <button onClick={()=>deleteSubject(selectedSubject)} style={{background:"transparent",border:"none",color:"#fc8181",cursor:"pointer",fontSize:"0.9rem",padding:"0.25rem"}}>🗑️</button>
          </div>

          {/* Progress bar */}
          {(()=>{
            const avg=getAvg(selected.entries);
            const goal=selected.goal;
            if(avg===null) return null;
            return (
              <div style={{padding:"0.5rem 1rem",borderBottom:`1px solid ${C.border}`}}>
                <div style={{height:"10px",background:C.border,borderRadius:"10px",overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${Math.min(avg,100)}%`,background:`linear-gradient(90deg,${getColor(avg)},${getColor(avg)}bb)`,borderRadius:"10px",transition:"width 0.4s"}}/>
                </div>
                {goal&&(
                  <div style={{position:"relative",height:"8px",marginTop:"2px"}}>
                    <div style={{position:"absolute",left:`${Math.min(goal,100)}%`,top:0,transform:"translateX(-50%)",fontSize:"0.6rem",color:C.accent}}>🎯</div>
                  </div>
                )}
              </div>
            );
          })()}

          {/* Grades chart - simple visual */}
          {selected.entries&&selected.entries.length>1&&(
            <div style={{padding:"0.75rem 1rem",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"flex-end",gap:"4px",height:"70px"}}>
              {selected.entries.map((e,i)=>{
                const h = Math.max(8, (e.grade/100)*50);
                return (
                  <div key={e.id} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",cursor:"pointer"}} title={`${e.label}: ${e.grade}`}>
                    <div style={{fontSize:"0.6rem",color:getColor(e.grade),fontWeight:700}}>{e.grade}</div>
                    <div style={{width:"100%",height:`${h}px`,background:getColor(e.grade),borderRadius:"3px 3px 0 0",opacity:0.85}}/>
                  </div>
                );
              })}
            </div>
          )}

          {/* Add grade */}
          <div style={{padding:"0.75rem 1rem",borderBottom:`1px solid ${C.border}`,display:"flex",gap:"0.5rem",alignItems:"center"}}>
            <input style={{...inp,flex:2}} placeholder="תיאור (למשל: מבחן פרק 3)" value={newLabel} onChange={e=>setNewLabel(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addEntry(selectedSubject)} />
            <input style={{...inp,width:"65px",textAlign:"center"}} type="number" min="0" max="100" placeholder="ציון" value={newGrade} onChange={e=>setNewGrade(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addEntry(selectedSubject)} />
            <button onClick={()=>addEntry(selectedSubject)} style={{background:C.accent,color:"#fff",border:"none",borderRadius:"8px",padding:"0.45rem 0.8rem",cursor:"pointer",fontWeight:600,fontSize:"0.85rem"}}>+ הוסף</button>
          </div>

          {/* Entries list */}
          <div style={{maxHeight:"220px",overflowY:"auto"}}>
            {(!selected.entries||selected.entries.length===0)&&(
              <div style={{padding:"1.2rem",textAlign:"center",color:C.muted,fontSize:"0.85rem"}}>אין ציונים עדיין — הוסף את הראשון!</div>
            )}
            {(selected.entries||[]).slice().reverse().map((e,i,arr)=>{
              const prev = arr[i+1];
              const diff = prev ? e.grade-prev.grade : null;
              return (
                <div key={e.id} style={{display:"flex",alignItems:"center",padding:"0.55rem 1rem",borderBottom:`1px solid ${C.border}22`,gap:"0.75rem"}}>
                  <div style={{width:"38px",height:"38px",borderRadius:"50%",background:getColor(e.grade)+"22",border:`2px solid ${getColor(e.grade)}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <span style={{fontWeight:800,fontSize:"0.85rem",color:getColor(e.grade)}}>{e.grade}</span>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:"0.88rem",color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.label}</div>
                    <div style={{fontSize:"0.73rem",color:C.muted}}>{new Date(e.date).toLocaleDateString("he-IL")}</div>
                  </div>
                  {diff!==null&&(
                    <span style={{fontSize:"0.78rem",fontWeight:600,color:diff>0?"#48bb78":diff<0?"#fc8181":C.muted}}>
                      {diff>0?`+${diff}`:diff===0?"—":diff}
                    </span>
                  )}
                  <button onClick={()=>deleteEntry(selectedSubject,e.id)} style={{background:"transparent",border:"none",color:C.muted,cursor:"pointer",padding:"0.2rem",fontSize:"0.8rem",opacity:0.6}}>✕</button>
                </div>
              );
            })}
          </div>

        </div>
      )}

      {subjects.length===0&&!showAddSubject&&(
        <div style={{textAlign:"center",padding:"2rem",color:C.muted}}>
          <div style={{fontSize:"2rem",marginBottom:"0.5rem"}}>📊</div>
          <div style={{fontWeight:600,marginBottom:"0.25rem"}}>עקוב אחר הציונים שלך</div>
          <div style={{fontSize:"0.82rem"}}>הוסף מקצוע כדי להתחיל</div>
        </div>
      )}
    </div>
  );
}

function AuthWrap({children}){return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}><div style={{width:"100%",maxWidth:"400px",background:C.card,border:`1px solid ${C.border}`,borderRadius:"20px",padding:"2rem",display:"flex",flexDirection:"column",gap:"1rem"}}>{children}</div></div>);}

function Login({onLogin,onRegister,onForgot}){
  const [u,setU]=React.useState("");const [p,setP]=React.useState("");const [err,setErr]=React.useState("");
  const inp={background:C.card,border:`1px solid ${C.border}`,color:C.text,padding:"0.7rem 1rem",borderRadius:"8px",fontSize:"0.93rem",width:"100%",outline:"none"};
  const go=()=>{const users=ls.get("users")||{};const found=Object.values(users).find(x=>x.username===u&&x.password===p);if(found)onLogin(found);else setErr("שם משתמש או סיסמא שגויים");};
  return(<AuthWrap><div style={{fontSize:"2.5rem",textAlign:"center"}}>📚</div><h1 style={{textAlign:"center",fontSize:"1.55rem",fontWeight:800}}>StudyTime</h1><input style={inp} placeholder="שם משתמש" value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} /><input type="password" style={inp} placeholder="סיסמא" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} />{err&&<div style={{color:C.red,fontSize:"0.85rem",textAlign:"center"}}>{err}</div>}<button onClick={go} style={{background:C.accent,color:"#fff",border:"none",padding:"0.7rem",borderRadius:"8px",fontSize:"0.93rem",fontWeight:600,cursor:"pointer"}}>כניסה</button><div style={{display:"flex",gap:"0.5rem",justifyContent:"center",flexWrap:"wrap"}}><button onClick={onRegister} style={{background:"transparent",color:C.accent,border:"none",fontSize:"0.85rem",cursor:"pointer"}}>הרשמה</button></div></AuthWrap>);
}

function Register({onRegister,onBack}){
  const [u,setU]=React.useState("");const [p,setP]=React.useState("");const [p2,setP2]=React.useState("");const [grade,setGrade]=React.useState("");const [err,setErr]=React.useState("");
  const inp={background:C.card,border:`1px solid ${C.border}`,color:C.text,padding:"0.7rem 1rem",borderRadius:"8px",fontSize:"0.93rem",width:"100%",outline:"none"};
  const grades=[["ה",5],["ו",6],["ז",7],["ח",8],["ט",9],["י",10],["יא",11],["יב",12]];
  const go=()=>{
    if(!u.trim()){setErr("הכנס שם משתמש");return;}
    if(p.length<4){setErr("סיסמא חייבת להיות לפחות 4 תווים");return;}
    if(p!==p2){setErr("הסיסמאות לא תואמות");return;}
    if(!grade){setErr("בחר כיתה");return;}
    const users=ls.get("users")||{};
    if(Object.values(users).find(x=>x.username===u)){setErr("שם משתמש כבר קיים");return;}
    const nu={id:genId(),username:u.trim(),password:p,grade:grade[0],gradeNum:grade[1],role:"student",personal:{homework:[],works:[],tests:[],schedule:{}},classChecks:{},gradesData:{},createdAt:Date.now(),lastLogin:Date.now()};
    users[nu.id]=nu;ls.set("users",users);syncUserToSupabase(nu);onRegister(nu);
  };
  return(
    <AuthWrap>
      <div style={{fontSize:"2.5rem",textAlign:"center"}}>&#128218;</div>
      <h1 style={{textAlign:"center",fontSize:"1.55rem",fontWeight:800}}>הרשמה</h1>
      <input style={inp} placeholder="שם משתמש" value={u} onChange={e=>setU(e.target.value)} />
      <input type="password" style={inp} placeholder="סיסמא" value={p} onChange={e=>setP(e.target.value)} />
      <input type="password" style={inp} placeholder="אימות סיסמא" value={p2} onChange={e=>setP2(e.target.value)} />
      <div>
        <div style={{fontSize:"0.85rem",color:C.muted,marginBottom:"0.5rem",fontWeight:600}}>&#127979; באיזה כיתה אתה?</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem"}}>
          {grades.map(([lbl,num])=>{
            const active=grade&&grade[0]===lbl;
            return(
              <button key={lbl} onClick={()=>setGrade([lbl,num])} style={{padding:"0.42rem 0.85rem",borderRadius:"10px",border:"1px solid "+(active?C.accent:C.border),background:active?C.accent+"33":"transparent",color:active?C.accent:C.muted,fontSize:"0.88rem",fontWeight:active?700:400,cursor:"pointer"}}>
                {"כיתה "+lbl}
              </button>
            );
          })}
        </div>
        {grade&&<div style={{fontSize:"0.75rem",color:C.muted,marginTop:"0.4rem"}}>כיתה {grade[0]} נבחרה &#10003;</div>}
      </div>
      {err&&<div style={{color:C.red,fontSize:"0.85rem",textAlign:"center"}}>{err}</div>}
      <button onClick={go} style={{background:C.accent,color:"#fff",border:"none",padding:"0.7rem",borderRadius:"8px",fontSize:"0.93rem",fontWeight:600,cursor:"pointer"}}>הירשם</button>
      <button onClick={onBack} style={{background:"transparent",color:C.text,border:`1px solid ${C.border}`,padding:"0.7rem",borderRadius:"8px",fontSize:"0.93rem",cursor:"pointer"}}>חזרה</button>
    </AuthWrap>
  );
}
function ForgotPassword({onBack}){
  const [u,setU]=React.useState("");const [msg,setMsg]=React.useState("");
  const inp={background:C.card,border:`1px solid ${C.border}`,color:C.text,padding:"0.7rem 1rem",borderRadius:"8px",fontSize:"0.93rem",width:"100%",outline:"none"};
  const go=()=>{const users=ls.get("users")||{};const found=Object.values(users).find(x=>x.username===u);setMsg(found?"הסיסמא שלך היא: "+found.password:"שם משתמש לא נמצא");};
  return(<AuthWrap><div style={{fontSize:"2.5rem",textAlign:"center"}}>🔑</div><h1 style={{textAlign:"center",fontSize:"1.55rem",fontWeight:800}}>שחזור סיסמא</h1><input style={inp} placeholder="שם משתמש" value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} />{msg&&<div style={{color:msg.includes("לא")?C.red:C.green,background:msg.includes("לא")?"#2d1a1a":"#0d2c1a",padding:"0.5rem 0.9rem",borderRadius:"8px",fontSize:"0.84rem"}}>{msg}</div>}<button onClick={go} style={{background:C.accent,color:"#fff",border:"none",padding:"0.7rem",borderRadius:"8px",fontSize:"0.93rem",fontWeight:600,cursor:"pointer"}}>שחזר</button><button onClick={onBack} style={{background:"transparent",color:C.text,border:`1px solid ${C.border}`,padding:"0.7rem",borderRadius:"8px",fontSize:"0.93rem",cursor:"pointer"}}>חזרה</button></AuthWrap>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
