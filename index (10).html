const supaFetch = (url, opts={}) => fetch(url, opts);

const supa = {
  from: (table) => ({
    select: (cols="*") => supaFetch(`${SUPA_URL}/rest/v1/${table}?select=${cols}`, {headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY}}).then(r=>r.json()),
    upsert: (data) => fetch(`${SUPA_URL}/rest/v1/${table}`, {method:"POST",headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},body:JSON.stringify(data)}).then(r=>r.json()),
    update: (data) => ({eq: (col,val) => fetch(`${SUPA_URL}/rest/v1/${table}?${col}=eq.${val}`, {method:"PATCH",headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Content-Type":"application/json"},body:JSON.stringify(data)}).then(r=>r.json())}),
    delete: () => ({eq: (col,val) => fetch(`${SUPA_URL}/rest/v1/${table}?${col}=eq.${val}`, {method:"DELETE",headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY}}).then(r=>r.json())}),
    eq: (col,val) => fetch(`${SUPA_URL}/rest/v1/${table}?${col}=eq.${val}&select=*`, {headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY}}).then(r=>r.json()),
  })

// Sync users and classes to/from Supabase
const syncFromSupabase = async () => {
  try {
    const [usersArr, classesArr] = await Promise.all([
      supa.from("st_users").select("*"),
      supa.from("classes").select("*")
    ]);
    if(Array.isArray(usersArr)) {
      const usersObj = {};
      usersArr.forEach(u => { usersObj[u.id] = {...u, personal: u.personal||{}, personalChecks: u.personal_checks||{}, gradesData: u.grades_data||{}, createdAt: u.created_at||u.createdAt, lastLogin: u.last_login||u.lastLogin, gradeNum: u.grade_num||u.gradeNum, role: u.role||'student'}; });
      _store["users"] = usersObj;
      try{ localStorage.setItem("users", JSON.stringify(usersObj)); }catch{}
    }
    if(Array.isArray(classesArr)) {
      // Store ALL classes in _store (for joining by code), but only save user classes to localStorage
      const classesObj = {};
      classesArr.forEach(c => {
        const members = Array.isArray(c.members) ? c.members : (typeof c.members==="string" ? JSON.parse(c.members||"[]") : []);
        const helpers = (c.helpers && typeof c.helpers==="object" && !Array.isArray(c.helpers)) ? c.helpers : {};
        const teachers = (c.teachers && typeof c.teachers==="object" && !Array.isArray(c.teachers)) ? c.teachers : {};
        classesObj[c.id] = {...c, adminId: c.admin_id, boardPhotos: c.board_photos||[], dictationSets: c.dictation_sets||[], members, helpers, teachers};
      });
      _store["classes"] = classesObj; // keep all in memory for code lookup
      // Only save classes the current user belongs to in localStorage
      const currentUserId = (() => { try{ return JSON.parse(localStorage.getItem("currentUser"))?.id; }catch{ return null; } })();
      const myClassesObj = {};
      Object.values(classesObj).forEach(c => {
        if(!currentUserId || (c.members||[]).includes(currentUserId)) myClassesObj[c.id] = c;
      });
      try{ localStorage.setItem("classes", JSON.stringify(myClassesObj)); }catch{}
    }
  } catch(e) { console.warn("Supabase sync failed, using local data", e); }
};

const syncUserToSupabase = async (user) => {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/st_users`, {
      method: "POST",
      headers: {
        "apikey": SUPA_KEY,
        "Authorization": "Bearer " + SUPA_KEY,
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates,return=minimal"
      },
      body: JSON.stringify({
        id: user.id, username: user.username, password: user.password,
        role: user.role||"student", grade: user.grade, grade_num: user.gradeNum||null,
        created_at: user.createdAt||null, last_login: user.lastLogin||Date.now(),
        personal: user.personal||{}, personal_checks: user.personalChecks||{},
        grades_data: user.gradesData||{}
      })
    });
    if(!res.ok){ const t=await res.text(); console.warn("User sync error:",t); }
  } catch(e) { console.warn("User sync failed", e); }
};

        dictation_sets: cls.dictationSets||[],
        board_photos: cls.boardPhotos||[], created_at: cls.createdAt||null
      })
    });
    if(!res.ok){ const t=await res.text(); console.warn("Class sync error:",t); }
  } catch(e) { console.warn("Class sync failed", e); }
};

// In-memory store - single source of truth
const _store = {};
const ls = {
  get:(k)=>{
    if(k in _store) return _store[k];
    try{ const v=JSON.parse(localStorage.getItem(k)); if(v!==null)_store[k]=v; return v||null; }catch{return null;}
  },
  set:(k,v)=>{
    _store[k]=v;
    try{ localStorage.setItem(k,JSON.stringify(v)); }catch{}
    // Sync to Supabase - handled per-item to avoid bulk overwrites
  }
};

  const saveUsername = () => {
    const trimmed = editUsername.trim();
    if(!trimmed){setEditFieldErr("שם משתמש לא יכול להיות ריק");return;}
    const all = ls.get("users")||{};
    const taken = Object.values(all).find(u=>u.username===trimmed&&u.id!==selected.id);
    if(taken){setEditFieldErr("שם משתמש תפוס");return;}
    all[selected.id] = {...all[selected.id], username:trimmed};
    ls.set("users", all);
    syncUserToSupabase(all[selected.id]);
    setSelected({...selected, username:trimmed});
    setAllUsers([...Object.values(all)]);
    setShowEditUsername(false); setEditUsername(""); setEditFieldErr("");
  };

  const saveGrade = () => {
    if(!editGrade){setEditFieldErr("בחר כיתה");return;}
    const gradeMap = {"ה":5,"ו":6,"ז":7,"ח":8,"ט":9,"י":10,"יא":11,"יב":12};
    const all = ls.get("users")||{};
    all[selected.id] = {...all[selected.id], grade:editGrade, gradeNum:gradeMap[editGrade]||null};
    ls.set("users", all);
    syncUserToSupabase(all[selected.id]);
    setSelected({...selected, grade:editGrade, gradeNum:gradeMap[editGrade]||null});
    setAllUsers([...Object.values(all)]);
    setShowEditGrade(false); setEditGrade(""); setEditFieldErr("");
  };
  const changeMasterCode = () => {
    if(masterOldCode !== getMasterCode()){setMasterErr("קוד נוכחי שגוי");setTimeout(()=>setMasterErr(""),2000);return;}
    if(masterNewCode.length < 4){setMasterErr("קוד חדש חייב להיות לפחות 4 תווים");return;}
    ls.set("adminMasterCode", masterNewCode);
    setMasterSuccess("הקוד עודכן ✓");
    setMasterOldCode(""); setMasterNewCode("");
    setTimeout(()=>{setMasterSuccess("");setShowMasterChange(false);},2000);
  };
  const setClassAdmin = (cls, newAdminId) => {
    const all = ls.get("classes")||{};
    all[cls.id] = {...cls, adminId: newAdminId};
    ls.set("classes", all);
    syncClassToSupabase(all[cls.id]);
    refresh();
  };

  const filteredUsers = allUsers.filter(u=>
    u.username?.toLowerCase().includes(search.toLowerCase())||(u.grade||"").includes(search)
  );
  const filteredClasses = allClasses.filter(c=>
    c.name?.toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div style={{position:"fixed",inset:0,background:C.bg,zIndex:700,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header */}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"0.85rem 1.25rem",display:"flex",alignItems:"center",gap:"0.75rem",flexShrink:0,flexWrap:"wrap"}}>
        <div style={{flex:1}}>
          <div style={{fontSize:"1.1rem",fontWeight:800,color:C.text}}>🛡️ לוח ניהול <span style={{fontSize:"0.75rem",color:C.muted,fontWeight:400}}>({allUsers.length} משתמשים · {allClasses.length} כיתות)</span></div>
          {(()=>{const locked=ls.get("adminLockLog");if(!locked)return null;const t=new Date(locked.time).toLocaleString("he-IL");return <div style={{fontSize:"0.72rem",color:"#fc8181",marginTop:"0.15rem"}}>⚠️ {locked.attempts} ניסיונות כניסה שגויים — {t}</div>})()}
        </div>
        <button onClick={()=>setShowLoginHistory(v=>!v)} style={{background:showLoginHistory?C.accent+"22":"transparent",border:`1px solid ${showLoginHistory?C.accent:C.border}`,color:showLoginHistory?C.accent:C.muted,padding:"0.35rem 0.7rem",borderRadius:"8px",fontSize:"0.8rem",cursor:"pointer"}}>📋 היסטוריה</button>
        <button onClick={()=>setShowMasterChange(v=>!v)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.35rem 0.65rem",borderRadius:"8px",fontSize:"0.78rem",cursor:"pointer"}}>🔐 שנה קוד</button>
        <button onClick={()=>askCode("ניקוי כל הנתונים — פעולה בלתי הפיכה!", ()=>{ls.set("users",{});ls.set("classes",{});ls.set("currentUser",null);window.location.reload();})} style={{background:"#fc818122",border:"1px solid #fc8181",color:"#fc8181",padding:"0.35rem 0.65rem",borderRadius:"8px",fontSize:"0.78rem",cursor:"pointer"}}>🗑️ נקה הכל</button>
        <button onClick={onClose} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.35rem 0.75rem",borderRadius:"8px",fontSize:"0.85rem",cursor:"pointer"}}>← יציאה</button>
      </div>

      {/* Master code change panel */}
      {showMasterChange&&(
        <div style={{background:C.card,borderBottom:`1px solid ${C.accent}`,padding:"0.85rem 1.25rem",display:"flex",gap:"0.6rem",alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:"0.82rem",color:C.muted,fontWeight:600}}>🔐 שינוי קוד גישה:</span>
          <input type="password" value={masterOldCode} onChange={e=>setMasterOldCode(e.target.value)} placeholder="קוד נוכחי" style={{background:C.bg,border:`1px solid ${C.border}`,color:C.text,padding:"0.4rem 0.65rem",borderRadius:"7px",fontSize:"0.85rem",outline:"none",width:"120px"}} />
          <input type="password" value={masterNewCode} onChange={e=>setMasterNewCode(e.target.value)} placeholder="קוד חדש" onKeyDown={e=>e.key==="Enter"&&changeMasterCode()} style={{background:C.bg,border:`1px solid ${C.border}`,color:C.text,padding:"0.4rem 0.65rem",borderRadius:"7px",fontSize:"0.85rem",outline:"none",width:"120px"}} />
          {masterErr&&<span style={{color:"#fc8181",fontSize:"0.8rem"}}>{masterErr}</span>}
          {masterSuccess&&<span style={{color:C.green,fontSize:"0.8rem",fontWeight:600}}>{masterSuccess}</span>}
          <button onClick={changeMasterCode} style={{background:C.accent,color:"#fff",border:"none",padding:"0.4rem 0.9rem",borderRadius:"7px",fontWeight:700,cursor:"pointer",fontSize:"0.82rem"}}>עדכן</button>
          <button onClick={()=>{setShowMasterChange(false);setMasterOldCode("");setMasterNewCode("");}} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.4rem 0.65rem",borderRadius:"7px",cursor:"pointer",fontSize:"0.82rem"}}>ביטול</button>
        </div>
      )}

      {/* Confirm code modal */}
      {confirmModal&&(
        <div style={{position:"fixed",inset:0,background:"#0009",zIndex:800,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setConfirmModal(null)}>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"16px",padding:"1.5rem",width:"300px",display:"flex",flexDirection:"column",gap:"0.75rem"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:700,fontSize:"0.95rem",color:C.text}}>🔐 אישור פעולה</div>
            <div style={{fontSize:"0.85rem",color:C.muted}}>{confirmModal.msg}</div>
            <input autoFocus type="password" value={confirmCode} onChange={e=>setConfirmCode(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitConfirm()} placeholder="הכנס קוד גישה" style={{background:C.bg,border:`1px solid ${confirmErr?'#fc8181':C.border}`,color:C.text,padding:"0.5rem 0.75rem",borderRadius:"8px",fontSize:"0.9rem",outline:"none"}} />
            {confirmErr&&<div style={{color:"#fc8181",fontSize:"0.8rem"}}>{confirmErr}</div>}
            <div style={{display:"flex",gap:"0.5rem"}}>
              <button onClick={submitConfirm} style={{flex:1,background:"#fc8181",color:"#fff",border:"none",padding:"0.55rem",borderRadius:"8px",fontWeight:700,cursor:"pointer"}}>אשר</button>
              <button onClick={()=>setConfirmModal(null)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.55rem 0.9rem",borderRadius:"8px",cursor:"pointer"}}>ביטול</button>
            </div>
          </div>
        </div>
      )}
      {/* Login History Panel */}
      {showLoginHistory&&(
        <div style={{background:C.bg,borderBottom:`1px solid ${C.border}`,padding:"1rem",flexShrink:0,maxHeight:"320px",overflowY:"auto"}}>
          <div style={{fontSize:"0.85rem",fontWeight:700,color:C.text,marginBottom:"0.75rem"}}>📋 היסטוריית כניסות ללוח האישי</div>
          {(()=>{
            const users=Object.values(ls.get("users")||{});
            const withLogin=users.filter(u=>u.lastLogin).sort((a,b)=>b.lastLogin-a.lastLogin);
            if(withLogin.length===0) return <div style={{color:C.muted,fontSize:"0.82rem"}}>אין נתוני כניסה עדיין</div>;
            return (
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:"0.8rem"}}>
                <thead>
                  <tr style={{borderBottom:`1px solid ${C.border}`}}>
                    <th style={{padding:"0.3rem 0.5rem",textAlign:"right",color:C.muted,fontWeight:600}}>משתמש</th>
                    <th style={{padding:"0.3rem 0.5rem",textAlign:"right",color:C.muted,fontWeight:600}}>כיתה</th>
                    <th style={{padding:"0.3rem 0.5rem",textAlign:"right",color:C.muted,fontWeight:600}}>תפקיד</th>
                    <th style={{padding:"0.3rem 0.5rem",textAlign:"right",color:C.muted,fontWeight:600}}>כניסה אחרונה</th>
                    <th style={{padding:"0.3rem 0.5rem",textAlign:"right",color:C.muted,fontWeight:600}}>לפני</th>
                  </tr>
                </thead>
                <tbody>
                  {withLogin.map(u=>{
                    const ago=Date.now()-u.lastLogin;
                    const mins=Math.floor(ago/60000);
                    const hrs=Math.floor(mins/60);
                    const days=Math.floor(hrs/24);
                    const agoStr=days>0?`לפני ${days} ימים`:hrs>0?`לפני ${hrs} שעות`:mins>0?`לפני ${mins} דקות`:"עכשיו";
                    const isRecent=ago<60*60*1000; // under 1hr
                    return (
                      <tr key={u.id} style={{borderBottom:`1px solid ${C.border}22`,background:isRecent?C.green+"11":"transparent"}}>
                        <td style={{padding:"0.35rem 0.5rem",fontWeight:600,color:C.text}}>
                          <span style={{marginLeft:"0.4rem"}}>{u.role==="admin"?"👑":u.role==="helper"?"🤝":"👤"}</span>{u.username}
                          {isRecent&&<span style={{background:C.green,color:"#fff",fontSize:"0.65rem",padding:"0.1rem 0.35rem",borderRadius:"10px",marginRight:"0.4rem"}}>פעיל</span>}
                        </td>
                        <td style={{padding:"0.35rem 0.5rem",color:C.muted}}>כיתה {u.grade||"—"}</td>
                        <td style={{padding:"0.35rem 0.5rem",color:u.role==="admin"?C.accent:C.muted,fontWeight:u.role==="admin"?700:400}}>{u.role==="admin"?"מנהל":u.role==="helper"?"עוזר":"תלמיד"}</td>
                        <td style={{padding:"0.35rem 0.5rem",color:C.muted,fontSize:"0.75rem"}}>{new Date(u.lastLogin).toLocaleString("he-IL")}</td>
                        <td style={{padding:"0.35rem 0.5rem",color:isRecent?C.green:C.muted,fontWeight:isRecent?600:400,fontSize:"0.75rem"}}>{agoStr}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            );
          })()}
        </div>
      )}
      {/* Tabs */}
      <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,background:C.card,flexShrink:0}}>
        {[["users","👥 משתמשים"],["classes","🏫 כיתות"]].map(([id,lbl])=>(
          <button key={id} onClick={()=>{setTab(id);setSelected(null);setSearch("");}} style={{padding:"0.7rem 1.5rem",border:"none",borderBottom:`2px solid ${tab===id?C.accent:"transparent"}`,background:"transparent",color:tab===id?C.accent:C.muted,fontWeight:tab===id?700:400,fontSize:"0.9rem",cursor:"pointer"}}>{lbl}</button>
        ))}
      </div>

      {/* Search */}
      <div style={{padding:"0.65rem 1rem",borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 חיפוש..." style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,color:C.text,padding:"0.5rem 0.75rem",borderRadius:"8px",fontSize:"0.88rem",outline:"none",boxSizing:"border-box"}} />
      </div>

      {/* Content */}
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        {tab==="users"&&(<>
          {/* Users table */}
          <div style={{flex:selected?0.45:1,borderLeft:`1px solid ${C.border}`,overflowY:"auto",transition:"flex 0.2s"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead style={{position:"sticky",top:0,background:C.card,zIndex:1}}>
                <tr style={{borderBottom:`2px solid ${C.border}`}}>
                  <th style={{padding:"0.6rem 1rem",textAlign:"right",color:C.muted,fontWeight:600,fontSize:"0.78rem"}}>משתמש</th>
                  <th style={{padding:"0.6rem 1rem",textAlign:"right",color:C.muted,fontWeight:600,fontSize:"0.78rem"}}>כיתה</th>
                  <th style={{padding:"0.6rem 1rem",textAlign:"right",color:C.muted,fontWeight:600,fontSize:"0.78rem"}}>תפקיד</th>
                </tr>
              </thead>
              <tbody>
                {filteredUsers.map(u=>(
                  <tr key={u.id} onClick={()=>{setSelected(selected?.id===u.id?null:u);setShowPassInput(false);setEditPass("");setPassCode("");setPassSuccess("");setShowPassword(false);}} style={{borderBottom:`1px solid ${C.border}`,cursor:"pointer",background:selected?.id===u.id?C.accent+"18":"transparent"}}>
                    <td style={{padding:"0.7rem 1rem"}}>
                      <div style={{display:"flex",alignItems:"center",gap:"0.6rem"}}>
                        <div style={{width:"32px",height:"32px",borderRadius:"50%",background:C.accent+"33",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:C.accent,fontSize:"0.85rem",flexShrink:0}}>{u.username?.[0]?.toUpperCase()||"?"}</div>
                        <span style={{fontWeight:600,fontSize:"0.88rem",color:C.text}}>{u.username}</span>
                      </div>
                    </td>
                    <td style={{padding:"0.7rem 1rem",fontSize:"0.85rem",color:C.muted}}>{u.grade||"—"}</td>
                    <td style={{padding:"0.7rem 1rem"}}>
                      <span style={{background:u.role==="admin"?"#f6ad5522":u.role==="helper"?"#63b3ed22":"#6c63ff22",color:u.role==="admin"?"#f6ad55":u.role==="helper"?"#63b3ed":C.accent,padding:"0.18rem 0.5rem",borderRadius:"20px",fontSize:"0.75rem",fontWeight:600}}>
                        {u.role==="admin"?"👑 מנהל":u.role==="helper"?"🤝 עוזר":"🎓 תלמיד"}
                      </span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            {filteredUsers.length===0&&<div style={{textAlign:"center",color:C.muted,padding:"3rem"}}>אין תוצאות</div>}
          </div>

          {/* User detail */}
          {selected&&(
            <div style={{flex:0.55,overflowY:"auto",padding:"1.25rem",borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",gap:"0.85rem"}}>
              <div style={{display:"flex",alignItems:"center",gap:"0.75rem"}}>
                <div style={{width:"52px",height:"52px",borderRadius:"50%",background:C.accent+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.4rem",fontWeight:800,color:C.accent}}>{selected.username?.[0]?.toUpperCase()||"?"}</div>
                <div>
                  <div style={{fontWeight:800,fontSize:"1.1rem",color:C.text}}>{selected.username}</div>
                  <div style={{fontSize:"0.78rem",color:C.muted}}>{selected.role==="admin"?"👑 מנהל":selected.role==="helper"?"🤝 עוזר":"🎓 תלמיד"} · {selected.grade||"ללא כיתה"}</div>
                </div>
                <button onClick={()=>setSelected(null)} style={{marginRight:"auto",background:"transparent",border:"none",color:C.muted,fontSize:"1.1rem",cursor:"pointer"}}>✕</button>
              </div>

              {[
                ["👤 שם משתמש", <span style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>{selected.username}<button onClick={()=>{setShowEditUsername(true);setEditUsername(selected.username);setEditFieldErr("");setShowEditGrade(false);}} style={{background:C.accent+"22",border:`1px solid ${C.accent}`,color:C.accent,padding:"0.1rem 0.4rem",borderRadius:"5px",fontSize:"0.75rem",cursor:"pointer"}}>✏️</button></span>],
                ["🎓 כיתה", <span style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>{selected.grade||"לא צוין"}<button onClick={()=>{setShowEditGrade(true);setEditGrade(selected.grade||"");setEditFieldErr("");setShowEditUsername(false);}} style={{background:C.accent+"22",border:`1px solid ${C.accent}`,color:C.accent,padding:"0.1rem 0.4rem",borderRadius:"5px",fontSize:"0.75rem",cursor:"pointer"}}>✏️</button></span>],
                ["🏷️ תפקיד", selected.role==="admin"?"מנהל":selected.role==="helper"?"עוזר":"תלמיד"],
                ["📅 נרשם", selected.createdAt?new Date(selected.createdAt).toLocaleDateString("he-IL"):"לא ידוע"],
                ["🕐 כניסה אחרונה", selected.lastLogin?new Date(selected.lastLogin).toLocaleString("he-IL"):"לא זמין"],
              ].map(([lbl,val])=>(
                <div key={lbl} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:C.card,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"0.6rem 0.9rem"}}>
                  <span style={{fontSize:"0.8rem",color:C.muted}}>{lbl}</span>
                  <span style={{fontSize:"0.88rem",color:C.text,fontWeight:600}}>{val}</span>
                </div>
              ))}

              {/* Password row */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:C.card,border:`1px solid ${C.border}`,borderRadius:"10px",padding:"0.6rem 0.9rem"}}>
                <span style={{fontSize:"0.8rem",color:C.muted}}>🔑 סיסמא</span>
                <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
                  <span style={{fontSize:"0.88rem",color:C.text,fontWeight:600,fontFamily:"monospace"}}>{showPassword?selected.password:"••••••••"}</span>
                  <button onClick={()=>setShowPassword(v=>!v)} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:"1rem",color:C.muted,padding:0,lineHeight:1}}>{showPassword?"🙈":"👁️"}</button>
                </div>
              </div>

              {passSuccess&&<div style={{background:"#48bb7822",border:"1px solid #48bb78",borderRadius:"10px",padding:"0.5rem 0.9rem",color:"#48bb78",fontSize:"0.85rem",textAlign:"center",fontWeight:600}}>{passSuccess}</div>}

              {showEditUsername&&(
                <div style={{background:C.bg,border:`1px solid ${C.accent}`,borderRadius:"10px",padding:"0.75rem",marginBottom:"0.75rem"}}>
                  <div style={{fontSize:"0.85rem",fontWeight:600,marginBottom:"0.5rem",color:C.accent}}>✏️ שינוי שם משתמש</div>
                  <input value={editUsername} onChange={e=>setEditUsername(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveUsername()} style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,color:C.text,padding:"0.5rem 0.7rem",borderRadius:"8px",fontSize:"0.88rem",outline:"none",marginBottom:"0.5rem"}} placeholder="שם משתמש חדש" />
                  {editFieldErr&&<div style={{color:"#fc8181",fontSize:"0.8rem",marginBottom:"0.4rem"}}>{editFieldErr}</div>}
                  <div style={{display:"flex",gap:"0.5rem"}}>
                    <button onClick={saveUsername} style={{flex:1,background:C.accent,color:"#fff",border:"none",padding:"0.5rem",borderRadius:"8px",fontWeight:700,cursor:"pointer",fontSize:"0.85rem"}}>שמור</button>
                    <button onClick={()=>{setShowEditUsername(false);setEditFieldErr("");}} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.5rem 0.75rem",borderRadius:"8px",cursor:"pointer",fontSize:"0.85rem"}}>ביטול</button>
                  </div>
                </div>
              )}
              {showEditGrade&&(
                <div style={{background:C.bg,border:`1px solid ${C.accent}`,borderRadius:"10px",padding:"0.75rem",marginBottom:"0.75rem"}}>
                  <div style={{fontSize:"0.85rem",fontWeight:600,marginBottom:"0.5rem",color:C.accent}}>✏️ שינוי כיתה</div>
                  <select value={editGrade} onChange={e=>setEditGrade(e.target.value)} style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,color:C.text,padding:"0.5rem 0.7rem",borderRadius:"8px",fontSize:"0.88rem",outline:"none",marginBottom:"0.5rem"}}>
                    <option value="">בחר כיתה</option>
                    {["ה","ו","ז","ח","ט","י","יא","יב"].map(g=><option key={g} value={g}>כיתה {g}</option>)}
                  </select>
                  {editFieldErr&&<div style={{color:"#fc8181",fontSize:"0.8rem",marginBottom:"0.4rem"}}>{editFieldErr}</div>}
                  <div style={{display:"flex",gap:"0.5rem"}}>
                    <button onClick={saveGrade} style={{flex:1,background:C.accent,color:"#fff",border:"none",padding:"0.5rem",borderRadius:"8px",fontWeight:700,cursor:"pointer",fontSize:"0.85rem"}}>שמור</button>
                    <button onClick={()=>{setShowEditGrade(false);setEditFieldErr("");}} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.5rem 0.75rem",borderRadius:"8px",cursor:"pointer",fontSize:"0.85rem"}}>ביטול</button>
                  </div>
                </div>
              )}

              {!showPassInput?(
                <button onClick={()=>setShowPassInput(true)} style={{background:C.accent+"22",border:`1px solid ${C.accent}`,color:C.accent,padding:"0.6rem",borderRadius:"10px",fontSize:"0.88rem",fontWeight:700,cursor:"pointer"}}>🔑 שנה סיסמא</button>
              ):(
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"12px",padding:"0.85rem",display:"flex",flexDirection:"column",gap:"0.55rem"}}>
                  <div style={{fontSize:"0.8rem",color:C.muted,fontWeight:600}}>שינוי סיסמא</div>
                  <input type="password" value={editPass} onChange={e=>setEditPass(e.target.value)} placeholder="סיסמא חדשה" style={{background:C.bg,border:`1px solid ${C.border}`,color:C.text,padding:"0.5rem 0.7rem",borderRadius:"8px",fontSize:"0.88rem",outline:"none"}} />
                  <input type="password" value={passCode} onChange={e=>setPassCode(e.target.value)} placeholder="קוד אישור" onKeyDown={e=>e.key==="Enter"&&changePassword()} style={{background:C.bg,border:`1px solid ${C.border}`,color:C.text,padding:"0.5rem 0.7rem",borderRadius:"8px",fontSize:"0.88rem",outline:"none"}} />

                  <div style={{display:"flex",gap:"0.5rem"}}>

function AccountModal({ user, onSave, onClose, theme, setTheme }) {
  const [username,setUsername]=React.useState(user.username||"");
  const [oldPass,setOldPass]=React.useState("");
  const [newPass,setNewPass]=React.useState("");
  const [newPass2,setNewPass2]=React.useState("");
  const [err,setErr]=React.useState("");
  const [success,setSuccess]=React.useState("");
  const [secretClicks,setSecretClicks]=React.useState(0);
  const [showAdminInput,setShowAdminInput]=React.useState(false);
  const [adminCode,setAdminCode]=React.useState("");
  const [adminErr,setAdminErr]=React.useState("");
  const [showAdmin,setShowAdmin]=React.useState(false);
  const [adminAttempts,setAdminAttempts]=React.useState(0);
  const [adminLockedUntil,setAdminLockedUntil]=React.useState(null);
  const handleSecretClick=()=>{
    const next=secretClicks+1;
    setSecretClicks(next);
    if(next>=5){setShowAdminInput(true);setSecretClicks(0);}
  };
  const checkAdmin=()=>{
    const now=Date.now();
    if(adminLockedUntil&&now<adminLockedUntil){
      const secs=Math.ceil((adminLockedUntil-now)/1000);
      setAdminErr(`נעול עוד ${secs} שניות`);
      return;
    }
    const masterCode=ls.get("adminMasterCode")||"040413";
    if(adminCode===masterCode){
      setShowAdmin(true);setShowAdminInput(false);setAdminCode("");
      setAdminAttempts(0);setAdminLockedUntil(null);
    } else {
      const newAttempts=adminAttempts+1;
      setAdminAttempts(newAttempts);
      if(newAttempts>=3){
        const lockUntil=now+5*60*1000;
        setAdminLockedUntil(lockUntil);
        ls.set("adminLockLog",{time:now,attempts:newAttempts});
        setAdminErr("3 ניסיונות שגויים — נעול ל-5 דקות");
        setAdminCode("");
      } else {
        setAdminErr(`קוד שגוי (${newAttempts}/3 ניסיונות)`);
        setTimeout(()=>setAdminErr(""),2000);
      }
    }
  };
  const inp={background:C.card,border:`1px solid ${C.border}`,color:C.text,padding:"0.65rem 0.9rem",borderRadius:"8px",fontSize:"0.88rem",outline:"none",width:"100%"};
  const save=()=>{
    setErr("");setSuccess("");
    if(!username.trim()){setErr("שם משתמש לא יכול להיות ריק");return;}
    const users=ls.get("users")||{};
    if(username!==user.username&&Object.values(users).find(u=>u.id!==user.id&&u.username===username)){setErr("שם משתמש כבר קיים");return;}
    let updUser={...user,username:username.trim()};
    if(newPass){
      if(oldPass!==user.password){setErr("סיסמא נוכחית שגויה");return;}
      if(newPass.length<4){setErr("סיסמא חדשה חייבת להיות לפחות 4 תווים");return;}
      if(newPass!==newPass2){setErr("הסיסמאות החדשות לא תואמות");return;}
      updUser={...updUser,password:newPass};
    }
    onSave(updUser);
    setSuccess("הפרטים עודכנו בהצלחה ✓");
    setTimeout(onClose,1000);
  };
  return (<>
    <div style={{position:"fixed",inset:0,background:"#000a",display:"flex",alignItems:"center",justifyContent:"center",zIndex:500,padding:"1rem"}} onClick={onClose}>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"20px",padding:"1.75rem",width:"100%",maxWidth:"380px",display:"flex",flexDirection:"column",gap:"0.9rem"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <h2 style={{fontSize:"1.1rem",fontWeight:700,margin:0}}>⚙️ פרטי חשבון</h2>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:C.muted,fontSize:"1.3rem",cursor:"pointer",lineHeight:1}}>✕</button>
        </div>
        <div>
          <div style={{fontSize:"0.78rem",color:C.muted,marginBottom:"0.35rem",fontWeight:600}}>שם משתמש</div>
          <input style={inp} value={username} onChange={e=>setUsername(e.target.value)} />
        </div>
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:"0.75rem"}}>
          <div onClick={handleSecretClick} style={{fontSize:"0.78rem",color:C.muted,marginBottom:"0.5rem",fontWeight:600,cursor:"default",userSelect:"none"}}>שינוי סיסמא (השאר ריק אם לא רוצה לשנות)</div>
          <div style={{display:"flex",flexDirection:"column",gap:"0.4rem"}}>
            <input type="password" style={inp} placeholder="סיסמא נוכחית" value={oldPass} onChange={e=>setOldPass(e.target.value)} />
            <input type="password" style={inp} placeholder="סיסמא חדשה" value={newPass} onChange={e=>setNewPass(e.target.value)} />
            <input type="password" style={inp} placeholder="אימות סיסמא חדשה" value={newPass2} onChange={e=>setNewPass2(e.target.value)} />
          </div>
        </div>
        {err&&<div style={{color:C.red,fontSize:"0.83rem",textAlign:"center"}}>{err}</div>}
        {success&&<div style={{color:C.green,fontSize:"0.83rem",textAlign:"center"}}>{success}</div>}
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:"0.75rem",marginBottom:"0.5rem"}}>
          <div style={{fontSize:"0.78rem",color:C.muted,marginBottom:"0.5rem",fontWeight:600}}>&#127763; &#1502;&#1510;&#1489; &#1514;&#1510;&#1493;&#1490;&#1492;</div>
          <div style={{display:"flex",gap:"0.4rem"}}>
            <button onClick={()=>setTheme("dark")} style={{flex:1,padding:"0.45rem",borderRadius:"10px",border:"1px solid "+(theme==="dark"?C.accent:C.border),background:theme==="dark"?C.accent+"33":"transparent",color:theme==="dark"?C.accent:C.muted,fontSize:"0.85rem",fontWeight:theme==="dark"?700:400,cursor:"pointer"}}>&#127769; &#1499;&#1492;&#1492;</button>
            <button onClick={()=>setTheme("light")} style={{flex:1,padding:"0.45rem",borderRadius:"10px",border:"1px solid "+(theme==="light"?C.accent:C.border),background:theme==="light"?C.accent+"33":"transparent",color:theme==="light"?C.accent:C.muted,fontSize:"0.85rem",fontWeight:theme==="light"?700:400,cursor:"pointer"}}>&#9728; &#1489;&#1492;&#1497;&#1512;</button>
          </div>
        </div>
        <div style={{display:"flex",gap:"0.5rem"}}>
          <button onClick={save} style={{flex:1,background:C.accent,color:"#fff",border:"none",padding:"0.65rem",borderRadius:"10px",fontSize:"0.9rem",fontWeight:700,cursor:"pointer"}}>שמור</button>
          <button onClick={onClose} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.65rem 1rem",borderRadius:"10px",fontSize:"0.9rem",cursor:"pointer"}}>ביטול</button>
        </div>
      </div>
    </div>
    {showAdminInput&&(
      <div style={{position:"fixed",inset:0,background:"#000c",display:"flex",alignItems:"center",justifyContent:"center",zIndex:600}} onClick={()=>{setShowAdminInput(false);setAdminCode("");}}>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"16px",padding:"1.5rem",width:"280px",display:"flex",flexDirection:"column",gap:"0.75rem"}} onClick={e=>e.stopPropagation()}>
          <div style={{fontSize:"1rem",fontWeight:700,color:C.text,textAlign:"center"}}>🔐 קוד גישה</div>
          <input autoFocus type="password" value={adminCode} onChange={e=>setAdminCode(e.target.value)} onKeyDown={e=>e.key==="Enter"&&checkAdmin()} placeholder="הכנס קוד..." disabled={!!(adminLockedUntil&&Date.now()<adminLockedUntil)} style={{background:C.bg,border:`1px solid ${adminLockedUntil&&Date.now()<adminLockedUntil?"#fc8181":C.border}`,color:C.text,padding:"0.65rem",borderRadius:"8px",fontSize:"1rem",outline:"none",textAlign:"center",letterSpacing:"0.2em",opacity:adminLockedUntil&&Date.now()<adminLockedUntil?0.5:1}} />
          {adminErr&&<div style={{color:"#fc8181",fontSize:"0.82rem",textAlign:"center"}}>{adminErr}</div>}
          <button onClick={checkAdmin} style={{background:C.accent,color:"#fff",border:"none",padding:"0.6rem",borderRadius:"8px",fontWeight:700,cursor:"pointer"}}>כניסה</button>
        </div>
      </div>
    )}
    {showAdmin&&<AdminPanel onClose={()=>setShowAdmin(false)} />}
    </>);
}

function Dashboard({ user: userProp, myClasses, setMode, mode }) {
  const user=ls.get("currentUser")||userProp;
  const personal=user.personal||{};
  const today=new Date().toISOString().split("T")[0];
  const upcoming=(arr)=>(arr||[]).filter(x=>!x.done&&(!x.dueDate||x.dueDate>=today)).sort((a,b)=>(a.dueDate||"9999")>(b.dueDate||"9999")?1:-1).slice(0,3);
  const allHwFull=[...upcoming(personal.homework).map(x=>({...x,_cls:null})),...upcoming((myClasses||[]).flatMap(c=>(c.homework||[]).map(x=>({...x,_cls:c.name}))))];
  const allWkFull=[...upcoming(personal.works).map(x=>({...x,_cls:null})),...upcoming((myClasses||[]).flatMap(c=>(c.works||[]).map(x=>({...x,_cls:c.name}))))];
  const allTsFull=[...upcoming(personal.tests).map(x=>({...x,_cls:null})),...upcoming((myClasses||[]).flatMap(c=>(c.tests||[]).map(x=>({...x,_cls:c.name}))))];
  const allHw=allHwFull.slice(0,3);
  const allWk=allWkFull.slice(0,3);
  const allTs=allTsFull.slice(0,3);

  // --- חישוב השיעור הבא ---
  const getNextLesson=()=>{
    const now=new Date();
    const nowMin=now.getHours()*60+now.getMinutes();
    const dayIdx=now.getDay(); // 0=ראשון בישראל? בjsאחד=שני
    // JS: 0=ראשון, 1=שני... 6=שבת — DAYS=["ראשון","שני"...]
    const todayHeb=DAYS[dayIdx===0?6:dayIdx-1]; // ממיר js day לעברי
    const parseTime=t=>{if(!t)return null;const[h,m]=(t||"").split(":").map(Number);return isNaN(h)?null:h*60+(m||0);};
    // אסוף כל לוחות שעות — אישי + כל כיתה
    const schedules=[
      {schedule:personal.schedule,label:"אישי",color:C.accent},
      ...(myClasses||[]).map(c=>({schedule:c.schedule,label:c.name,color:"#63b3ed"}))
    ];
    let best=null;
    for(const {schedule,label,color} of schedules){
      if(!schedule?.rows||!schedule?.days)continue;
      const dayData=schedule.days[todayHeb]||{};
      for(const row of schedule.rows){
        const subj=dayData[row.id];
        if(!subj||!subj.trim())continue;
        const start=parseTime(row.from);
        if(start===null)continue;
        if(start>nowMin){
          if(!best||start<best.start)best={subj,from:row.from,to:row.to,label,color,start};
        }
      }
    }
    return best;
  };
  const nextLesson=getNextLesson();
  const Section=({title,items,color,icon,count})=>(
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"14px",padding:"1rem 1.25rem",flex:1,minWidth:"180px"}}>
      <div style={{display:"flex",alignItems:"center",gap:"0.5rem",marginBottom:"0.75rem"}}>
        <span style={{fontSize:"1.1rem"}}>{icon}</span>
        <span style={{fontWeight:700,fontSize:"0.92rem",color,flex:1}}>{title}</span>
        {<span style={{background:color,color:"#fff",borderRadius:"999px",fontSize:"0.72rem",fontWeight:700,minWidth:"20px",height:"20px",display:"flex",alignItems:"center",justifyContent:"center",padding:"0 6px"}}>{count||0}</span>}
      </div>
      {items.length===0
        ?<div style={{fontSize:"0.82rem",color:C.muted,textAlign:"center",padding:"0.75rem 0"}}>אין קרובים ✨</div>
        :items.map(item=>{
          const d=item.dueDate?Math.ceil((new Date(item.dueDate)-new Date())/(1000*60*60*24)):null;
          return(
            <div key={item.id+(item._cls||"")} style={{borderBottom:`1px solid ${C.border}33`,padding:"0.4rem 0"}}>
              <div style={{fontSize:"0.85rem",fontWeight:600}}>{item.title}</div>
              {item._cls&&<div style={{fontSize:"0.7rem",color:"#63b3ed"}}>🏫 {item._cls}</div>}
              {d!==null&&<div style={{fontSize:"0.72rem",color:d<=2?"#fc8181":d<=5?"#f6ad55":C.muted}}>עוד {d} ימים</div>}
            </div>
          );
        })
      }
    </div>
  );
  return (
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <h2 style={{fontSize:"1.2rem",fontWeight:700,margin:"0 0 0.2rem"}}>שלום, {user.username} 👋</h2>
        <p style={{color:C.muted,fontSize:"0.84rem",margin:0}}>{new Date().toLocaleDateString("he-IL",{weekday:"long"})}</p>
      </div>
      <div style={{display:"flex",gap:"0.6rem",marginBottom:"1.25rem",flexWrap:"wrap"}}>
        {(()=>{
          // Smart recommendations based on upcoming items
          const nextTest=allTsFull[0];
          const nextHw=allHwFull[0];
          const nextWk=allWkFull[0];
          const allDictation=(myClasses||[]).flatMap(c=>(c.dictationSets||[]));
          const hasDictation=allDictation.length>0||(ls.get("studySets_"+user.id)||[]).length>0;
          const recs=[];
          // Test recommendation - highest priority
          if(nextTest){
            const d=nextTest.dueDate?Math.ceil((new Date(nextTest.dueDate)-new Date())/(1000*60*60*24)):null;
            const urgent=d!==null&&d<=5;
            recs.push({
              onClick:()=>setMode("study"),
              icon:"🧠",
              label:"הכנה למבחן",
              sub:nextTest.title+(d!==null?` — עוד ${d} ימים`:""),
              color:"#f6855a",
              urgent
            });
          }
          // Dictation recommendation
          if(hasDictation){
            recs.push({
              onClick:()=>setMode("study"),
              icon:"📝",
              label:"למידה להכתבה",
              sub:"יש ערכות מילים ללמידה",
              color:C.accent,
              urgent:false
            });
          }
          // Homework recommendation
          if(nextHw&&recs.length<2){
            const d=nextHw.dueDate?Math.ceil((new Date(nextHw.dueDate)-new Date())/(1000*60*60*24)):null;
            recs.push({
              onClick:()=>setMode("personal"),
              icon:"📚",
              label:"שיעורי בית",
              sub:nextHw.title+(d!==null?` — עוד ${d} ימים`:""),
              color:"#6c63ff",
              urgent:d!==null&&d<=2
            });
          }
          // Work recommendation
          if(nextWk&&recs.length<2){
            const d=nextWk.dueDate?Math.ceil((new Date(nextWk.dueDate)-new Date())/(1000*60*60*24)):null;
            recs.push({
              onClick:()=>setMode("personal"),
              icon:"📁",
              label:"עבודה להגשה",
              sub:nextWk.title+(d!==null?` — עוד ${d} ימים`:""),
              color:"#f6ad55",
              urgent:d!==null&&d<=3
            });
          }
          // Fallback if nothing urgent
          if(recs.length===0){
            recs.push({onClick:()=>setMode("study"),icon:"📖",label:"מצב למידה",sub:"אין פריטים קרובים",color:C.accent,urgent:false});
          }
          return recs.slice(0,2).map((r,idx)=>(
            <button key={idx} onClick={r.onClick} style={{display:"flex",alignItems:"center",gap:"0.6rem",background:r.urgent?r.color+"22":C.card,border:`1px solid ${r.urgent?r.color+"88":C.border}`,color:C.text,padding:"0.5rem 0.9rem",borderRadius:"12px",fontSize:"0.84rem",fontWeight:600,cursor:"pointer",textAlign:"right",flex:1,minWidth:"160px",position:"relative",overflow:"hidden"}}>
              {r.urgent&&<div style={{position:"absolute",top:0,left:0,right:0,height:"2px",background:r.color}}/>}
              <span style={{fontSize:"1.2rem"}}>{r.icon}</span>
              <div style={{textAlign:"right"}}>
                <div style={{color:r.color,fontWeight:700,fontSize:"0.82rem"}}>{r.label}</div>
                <div style={{color:C.muted,fontSize:"0.72rem",fontWeight:400}}>{r.sub}</div>
              </div>
            </button>
          ));
        })()}
      </div>
      <div style={{display:"flex",gap:"0.75rem",flexWrap:"wrap"}}>
        <Section title="שיעורי בית" items={allHw} color="#6c63ff" icon="📝" count={allHwFull.length} />
        <Section title="עבודות" items={allWk} color="#f6ad55" icon="📁" count={allWkFull.length} />
        <Section title="מבחנים" items={allTs} color="#fc8181" icon="📋" count={allTsFull.length} />
      </div>
      {/* שורת השיעור הבא */}
      <div style={{background:C.card,border:`1px solid ${nextLesson?nextLesson.color+"55":C.border}`,borderRadius:"12px",padding:"0.65rem 1rem",marginTop:"1rem",display:"flex",alignItems:"center",gap:"0.75rem"}}>
        <span style={{fontSize:"1.1rem"}}>🕐</span>
        <div style={{flex:1}}>
          {nextLesson
            ?<><span style={{fontWeight:700,fontSize:"0.9rem",color:nextLesson.color}}>{nextLesson.subj}</span><span style={{fontSize:"0.78rem",color:C.muted,marginRight:"0.5rem"}}> · {nextLesson.from}–{nextLesson.to}</span>{nextLesson.label!=="אישי"&&<span style={{fontSize:"0.72rem",color:"#63b3ed",marginRight:"0.4rem"}}>🏫 {nextLesson.label}</span>}</>
            :<span style={{fontSize:"0.84rem",color:C.muted}}>אין שיעורים נוספים היום</span>
          }
        </div>
        <span style={{fontSize:"0.75rem",color:C.muted,whiteSpace:"nowrap"}}>שיעור הבא</span>
      </div>
    </div>
  );
}

function PersonalMode({ user, saveUser, tab, setTab }) {
  const personal=user.personal||{};
  const isAdmin=user.role==="admin";
  const isTeacher=user.role==="teacher";
  const upd=(f,v)=>saveUser({...user,personal:{...personal,[f]:v}});
  const getC=t=>(user.personalChecks||{})[t]||{};
  const setC=(t,id,v)=>{const c={...(user.personalChecks||{})};if(!c[t])c[t]={};c[t][id]=v;saveUser({...user,personalChecks:c});};
  const tabs=[["homework","📝 שיעורי בית"],["works","📁 עבודות"],["tests","📋 מבחנים"],["schedule","🗓️ לוח שעות"],["done","✅ בוצע"],["grades","📊 ציונים"]];
  return (
    <div>
      <div style={{display:"flex",gap:"0.2rem",marginBottom:"1rem",borderBottom:`1px solid ${C.border}`,overflowX:"auto"}}>
        {tabs.map(([k,lbl])=>(
          <button key={k} onClick={()=>setTab(k)} style={{background:"transparent",border:"none",color:tab===k?C.accent:C.muted,padding:"0.55rem 0.8rem",fontSize:"0.82rem",fontWeight:tab===k?700:400,cursor:"pointer",borderBottom:tab===k?`2px solid ${C.accent}`:"2px solid transparent",whiteSpace:"nowrap"}}>{lbl}</button>
        ))}
      </div>
      {tab==="homework"&&<ItemList items={personal.homework} onSave={v=>upd("homework",v)} title="שיעורי בית" checks={getC("homework")} onCheck={(id,v)=>setC("homework",id,v)} showCheck />}
      {tab==="works"&&<ItemList items={personal.works} onSave={v=>upd("works",v)} title="עבודות" checks={getC("works")} onCheck={(id,v)=>setC("works",id,v)} showCheck />}
      {tab==="tests"&&<ItemList items={personal.tests} onSave={v=>upd("tests",v)} title="מבחנים" checks={getC("tests")} onCheck={(id,v)=>setC("tests",id,v)} isTests />}
      {tab==="schedule"&&<Schedule data={personal.schedule} onSave={v=>upd("schedule",v)} editable userChecks={getC("schedule")} onUserCheck={(k,v)=>setC("schedule",k,v)} />}
      {tab==="done"&&<DoneList sections={[{title:"שיעורי בית",items:personal.homework,checks:getC("homework"),color:"#6c63ff"},{title:"עבודות",items:personal.works,checks:getC("works"),color:"#f6ad55"},{title:"מבחנים",items:personal.tests,checks:getC("tests"),color:"#fc8181"}]} onUncheck={(t,id)=>setC(t,id,false)} />}
      {tab==="grades"&&<GradesTracker user={user} saveUser={saveUser} />}
    </div>
  );
}

function ClassesMode({ user, saveUser, myClasses, setMyClasses, refreshClasses, tab, setTab, classView, setClassView }) {
  const uid = user?.id;
  const [newName,setNewName]=React.useState("");
  const [joinCode,setJoinCode]=React.useState("");
  const [msg,setMsg]=React.useState("");
  const inp={background:C.card,border:`1px solid ${C.border}`,color:C.text,padding:"0.6rem 0.9rem",borderRadius:"8px",fontSize:"0.88rem",outline:"none",width:"100%"};

  const createClass=()=>{
    if(!newName.trim()||!uid) return;
    const id=genId(),code=Math.random().toString(36).slice(2,7).toUpperCase();
    const cls={id,name:newName.trim(),code,adminId:uid,members:[uid],helpers:{},homework:[],works:[],tests:[],schedule:{},dictationSets:[],boardPhotos:[],photographers:[]};
    const all=ls.get("classes")||{};all[id]=cls;ls.set("classes",all);syncClassToSupabase(cls);
    setMyClasses(prev=>[...prev,cls]);
    setNewName("");setMsg("כיתה נוצרה! קוד: "+code);setTimeout(()=>setMsg(""),15000);
  };
  const joinClass=()=>{
    if(!uid) return;
    const code = joinCode.toUpperCase().trim();
    // Search in _store (has all classes) first, then localStorage
    const allFromStore = _store["classes"] || {};
    const allLocal = ls.get("classes")||{};
    const allCombined = {...allLocal, ...allFromStore};
    const cls = Object.values(allCombined).find(c=>c.code===code);
    if(!cls){setMsg("קוד לא נמצא");return;}
    if((cls.members||[]).includes(uid)){
      // Already member - just navigate to it
      setClassView(cls.id);
      return;
    }
    const updatedCls = {...cls, members:[...(cls.members||[]),uid]};
    // Update localStorage
    allLocal[updatedCls.id]=updatedCls;
    ls.set("classes",allLocal);
    // Update _store
    if(_store["classes"]) _store["classes"][updatedCls.id]=updatedCls;
    syncClassToSupabase(updatedCls);
    // Update state and navigate
    setMyClasses(prev=>{
      const exists=prev.find(c=>c.id===updatedCls.id);
      return exists?prev.map(c=>c.id===updatedCls.id?updatedCls:c):[...prev,updatedCls];
    });
    setJoinCode("");
    setMsg("הצטרפת לכיתה: "+updatedCls.name);
    setTimeout(()=>setClassView(updatedCls.id),300);
  };

  const cv=classView?(myClasses.find(c=>c.id===classView)||(_store["classes"]&&_store["classes"][classView])||null):null;
  if(cv) return <ClassDetail cls={cv} user={user} saveUser={saveUser} refreshClasses={refreshClasses} onBack={()=>setClassView(null)} tab={tab} setTab={setTab} />;

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.75rem",marginBottom:"1.5rem"}}>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"14px",padding:"1rem"}}>
          <div style={{fontWeight:700,fontSize:"0.9rem",marginBottom:"0.6rem"}}>➕ צור כיתה חדשה</div>
          <div style={{display:"flex",gap:"0.5rem"}}>
            <input style={{...inp,flex:1}} placeholder="שם הכיתה" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createClass()} />
            <button onClick={createClass} style={{background:C.accent,color:"#fff",border:"none",padding:"0.6rem 1rem",borderRadius:"8px",fontSize:"0.88rem",fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>צור</button>
          </div>
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"14px",padding:"1rem"}}>
          <div style={{fontWeight:700,fontSize:"0.9rem",marginBottom:"0.6rem"}}>🔗 הצטרף לכיתה</div>
          <div style={{display:"flex",gap:"0.5rem"}}>
            <input style={{...inp,flex:1}} placeholder="קוד כיתה" value={joinCode} onChange={e=>setJoinCode(e.target.value)} onKeyDown={e=>e.key==="Enter"&&joinClass()} />
            <button onClick={joinClass} style={{background:"#2a9d8f",color:"#fff",border:"none",padding:"0.6rem 1rem",borderRadius:"8px",fontSize:"0.88rem",fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>הצטרף</button>
          </div>
        </div>
      </div>
      {msg&&<div style={{background:C.card,border:`1px solid ${C.green}`,borderRadius:"10px",padding:"0.6rem 1rem",fontSize:"0.85rem",color:C.green,marginBottom:"1rem"}}>{msg}</div>}
      {myClasses.length===0?<div style={{textAlign:"center",padding:"3rem",color:C.muted}}>אין כיתות עדיין</div>:(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.6rem"}}>
          {myClasses.map(c=>{
            const isAdmin=c.adminId===user.id;
            const helpers=c.helpers||{};
            const isHelper=!!helpers[user.id];
            return(
              <div key={c.id} onClick={()=>setClassView(c.id)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"16px",padding:"1.4rem 1.25rem",cursor:"pointer"}}>
                <div style={{fontSize:"1.5rem",marginBottom:"0.5rem"}}>🏫</div>
                <div style={{fontWeight:700,fontSize:"1.05rem",marginBottom:"0.3rem"}}>{c.name}</div>
                <div style={{fontSize:"0.78rem",color:C.muted,marginBottom:"0.6rem"}}>קוד: {c.code} · {(c.members||[]).length} חברים</div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  {isAdmin&&<span style={{background:C.accent,color:"#fff",fontSize:"0.68rem",padding:"0.15rem 0.5rem",borderRadius:"20px"}}>👑 מנהל</span>}
                  {!isAdmin&&isTeacher&&<span style={{background:"#f6ad55",color:"#fff",fontSize:"0.68rem",padding:"0.15rem 0.5rem",borderRadius:"20px"}}>👨‍🏫 מורה</span>}
                  {!isAdmin&&!isTeacher&&isHelper&&<span style={{background:"#63b3ed",color:"#fff",fontSize:"0.68rem",padding:"0.15rem 0.5rem",borderRadius:"20px"}}>🤝 עוזר</span>}
                  {!isAdmin&&!isTeacher&&!isHelper&&<span style={{fontSize:"0.68rem",color:C.muted}}>👤 תלמיד</span>}
                  <span style={{color:C.muted,fontSize:"0.85rem"}}>←</span>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

const PERM_OPTIONS=[
  {id:"homework",label:"📝 שיעורי בית"},
  {id:"works",label:"📁 עבודות"},
  {id:"tests",label:"📋 מבחנים"},
  {id:"schedule",label:"🗓️ לוח שעות"},
  {id:"dictation",label:"📖 הכתבה"},
  {id:"photos",label:"📷 צילומי לוח"},
];

function ClassDetail({ cls, user, saveUser, refreshClasses, onBack, tab, setTab }) {
  const isAdmin=cls.adminId===user.id;
  const helpers=cls.helpers||{};
  const teachers=cls.teachers||{};
  const myPerms=helpers[user.id]?.perms||[];
  const isHelper=!!helpers[user.id];
  const isTeacher=!!teachers[user.id];
  const can=(p)=>isAdmin||isTeacher||myPerms.includes(p);
  const photographers=cls.photographers||[];
  const canPhoto=can("photos")||photographers.includes(user.username);

  const updCls=(f,v)=>{const all=ls.get("classes")||{};if(all[cls.id])all[cls.id][f]=v;ls.set("classes",all);refreshClasses(user?.id);syncClassToSupabase(all[cls.id]);};

  const leaveClass=()=>{
    if(cls.adminId===user.id){alert("מנהל לא יכול לעזוב כיתה. מחק את הכיתה במקום.");return;}
    const all=ls.get("classes")||{};
    if(!all[cls.id]) return;
    all[cls.id].members=(all[cls.id].members||[]).filter(m=>m!==user.id);
    delete (all[cls.id].helpers||{})[user.id];
    delete (all[cls.id].teachers||{})[user.id];
    ls.set("classes",all);
    syncClassToSupabase(all[cls.id]);
    refreshClasses(user?.id);
    onBack();
  };

  const removeMember=(memberId)=>{
    const all=ls.get("classes")||{};
    if(!all[cls.id]) return;
    all[cls.id].members=(all[cls.id].members||[]).filter(m=>m!==memberId);
    delete (all[cls.id].helpers||{})[memberId];
    ls.set("classes",all);
    syncClassToSupabase(all[cls.id]);
    refreshClasses(user?.id);
  };
  const getC=t=>(user.classChecks?.[cls.id]?.[t])||{};
  const setC=(t,id,v)=>{const c={...(user.classChecks||{})};if(!c[cls.id])c[cls.id]={};if(!c[cls.id][t])c[cls.id][t]={};c[cls.id][t][id]=v;saveUser({...user,classChecks:c});};
  const dictationSets=cls.dictationSets||[];
  const saveSet=(set)=>{const ex=dictationSets.find(s=>s.id===set.id);updCls("dictationSets",ex?dictationSets.map(s=>s.id===set.id?set:s):[...dictationSets,set]);};
  const delSet=(id)=>updCls("dictationSets",dictationSets.filter(s=>s.id!==id));

  const tabs=[["homework","📝 שיעורי בית"],["works","📁 עבודות"],["tests","📋 מבחנים"],["schedule","🗓️ לוח שעות"],["dictation","📖 הכתבה"],["photos","📷 צילומי לוח"]];
  if(isAdmin||isTeacher||isHelper) tabs.push(["members","👥 חברים"]);
  tabs.push(["done","✅ בוצע"]);

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:"0.6rem",marginBottom:"1rem",flexWrap:"wrap"}}>
        <button onClick={onBack} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"0.35rem 0.7rem",borderRadius:"8px",fontSize:"0.85rem",cursor:"pointer"}}>← חזרה</button>
        <h2 style={{fontSize:"1.05rem",fontWeight:700,margin:0}}>{cls.name}</h2>
        {isAdmin&&<span style={{background:C.accent,color:"#fff",fontSize:"0.65rem",padding:"0.1rem 0.4rem",borderRadius:"20px"}}>👑 מנהל</span>}
        {!isAdmin&&isTeacher&&<span style={{background:"#f6ad55",color:"#fff",fontSize:"0.65rem",padding:"0.2rem 0.55rem",borderRadius:"20px",fontWeight:600}}>👨‍🏫 מורה</span>}
        {!isAdmin&&!isTeacher&&isHelper&&<span style={{background:"#63b3ed",color:"#fff",fontSize:"0.65rem",padding:"0.2rem 0.55rem",borderRadius:"20px",fontWeight:600}}>🤝 עוזר</span>}
        {cls.adminId!==user.id&&<button onClick={()=>{if(window.confirm("לעזוב את הכיתה "+cls.name+"?"))leaveClass();}} style={{marginRight:"auto",background:"#fc818122",border:"1px solid #fc8181",color:"#fc8181",padding:"0.3rem 0.7rem",borderRadius:"8px",fontSize:"0.8rem",cursor:"pointer"}}>🚪 עזוב כיתה</button>}
        <span style={{background:C.card,border:`1px solid ${C.border}`,color:C.muted,fontSize:"0.72rem",padding:"0.1rem 0.4rem",borderRadius:"8px"}}>קוד: {cls.code}</span>
      </div>
      <div style={{display:"flex",gap:"0.2rem",marginBottom:"1rem",borderBottom:`1px solid ${C.border}`,overflowX:"auto"}}>
        {tabs.map(([k,lbl])=>(
          <button key={k} onClick={()=>setTab(k)} style={{background:"transparent",border:"none",color:tab===k?C.accent:C.muted,padding:"0.55rem 0.75rem",fontSize:"0.8rem",fontWeight:tab===k?700:400,cursor:"pointer",borderBottom:tab===k?`2px solid ${C.accent}`:"2px solid transparent",whiteSpace:"nowrap"}}>{lbl}</button>
        ))}
      </div>
      {tab==="homework"&&<ItemList items={cls.homework} onSave={can("homework")?v=>updCls("homework",v):null} title="שיעורי בית" readOnly={!can("homework")} checks={getC("homework")} onCheck={(id,v)=>setC("homework",id,v)} showCheck />}
      {tab==="works"&&<ItemList items={cls.works} onSave={can("works")?v=>updCls("works",v):null} title="עבודות" readOnly={!can("works")} checks={getC("works")} onCheck={(id,v)=>setC("works",id,v)} showCheck />}
      {tab==="tests"&&<ItemList items={cls.tests} onSave={isAdmin?v=>updCls("tests",v):null} title="מבחנים" readOnly={!isAdmin} checks={getC("tests")} onCheck={(id,v)=>setC("tests",id,v)} isTests />}
      {tab==="schedule"&&<Schedule data={cls.schedule} onSave={can("schedule")?v=>updCls("schedule",v):null} editable={can("schedule")} userChecks={getC("schedule")} onUserCheck={(k,v)=>setC("schedule",k,v)} />}
      {tab==="dictation"&&<ClassDictation sets={dictationSets} isAdmin={can("dictation")} onSave={saveSet} onDelete={delSet} clsName={cls.name} />}
      {tab==="photos"&&<ClassBoardPhotos cls={cls} isAdmin={isAdmin} canAdd={canPhoto} updCls={updCls} />}
      {tab==="members"&&(isAdmin||isHelper)&&<ClassMembers cls={cls} user={user} updCls={isAdmin||isTeacher?updCls:null} isAdmin={isAdmin} isTeacher={isTeacher} />}
      {tab==="done"&&<DoneList sections={[{title:"שיעורי בית",items:cls.homework,checks:getC("homework"),color:"#6c63ff"},{title:"עבודות",items:cls.works,checks:getC("works"),color:"#f6ad55"},{title:"מבחנים",items:cls.tests,checks:getC("tests"),color:"#fc8181"}]} onUncheck={(t,id)=>setC(t,id,false)} />}
    </div>
  );
}

function ClassMembers({ cls, user, updCls, isAdmin, isTeacher=false }) {
  const members=cls.members||[];
  const helpers=cls.helpers||{};
  const teachers=cls.teachers||{};
  const BLUE="#63b3ed";
  const [expandedId,setExpandedId]=React.useState(null);
  const allUsers=ls.get("users")||{};
  const getName=id=>{const u=allUsers[id];return u?u.username:"משתמש";};
  const getRole=id=>id===cls.adminId?"admin":teachers[id]?"teacher":helpers[id]?"helper":"student";
  const getPerms=id=>helpers[id]?.perms||[];
  const setRole=(id,role)=>{

                    {role==="helper"&&<button onClick={()=>setExpandedId(expanded?null:id)} style={{padding:"0.22rem 0.55rem",borderRadius:"8px",fontSize:"0.74rem",cursor:"pointer",border:"1px solid "+BLUE,background:expanded?BLUE+"33":"transparent",color:BLUE}}>{expanded?"סגור ✓":"✏ הרשאות"}</button>}
                    <button onClick={()=>{if(window.confirm("להסיר?"))remove(id);}} style={{padding:"0.22rem 0.55rem",borderRadius:"8px",fontSize:"0.74rem",cursor:"pointer",border:"1px solid #c53030",background:"#c5303022",color:"#fc8181"}}>✕</button>
                  </div>
                ):(
                  <span style={{fontSize:"0.72rem",padding:"0.15rem 0.5rem",borderRadius:"20px",background:role==="admin"?C.accent+"22":role==="teacher"?"#f6ad5522":role==="helper"?BLUE+"22":"#ffffff0a",color:role==="admin"?C.accent:role==="teacher"?"#f6ad55":role==="helper"?BLUE:C.muted,border:"1px solid "+(role==="admin"?C.accent+"44":role==="helper"?BLUE+"44":C.border)}}>
                    {role==="admin"?"👑 מנהל":role==="teacher"?"👨‍🏫 מורה":role==="helper"?"🤝 עוזר":"👤 תלמיד"}
                  </span>
                )}

              {isAdmin&&role==="helper"&&expanded&&(
                <div style={{borderTop:"1px solid "+BLUE+"33",background:BLUE+"0d",padding:"0.75rem 1rem"}}>
                  <div style={{fontSize:"0.78rem",color:BLUE,fontWeight:700,marginBottom:"0.5rem"}}>✏ הרשאות עוזר — לחץ כדי להפעיל/לכבות:</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem"}}>
                    {PERM_OPTIONS.map(opt=>{const active=perms.includes(opt.id);return(<button key={opt.id} onClick={()=>togglePerm(id,opt.id)} style={{background:active?BLUE+"33":"transparent",border:"1px solid "+(active?BLUE:C.border),color:active?BLUE:C.muted,padding:"0.3rem 0.75rem",borderRadius:"20px",fontSize:"0.8rem",fontWeight:active?700:400,cursor:"pointer"}}>{active?"✓ ":""}{opt.label}</button>);})}
                  </div>

          );
        })}
        {members.length<=1&&<div style={{textAlign:"center",padding:"2rem",color:C.muted,fontSize:"0.85rem"}}>אין חברים נוספים</div>}
